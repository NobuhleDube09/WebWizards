<!doctype html>
<html lang="en">
<head>
  <script>(function(){if(localStorage.getItem("cc_theme")==="dark")document.documentElement.setAttribute("data-theme","dark");}());</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/assets/campus_logo.svg" type="image/svg+xml">
  <title>Profile — CampusConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* ── Global dark theme + animated background ──────────────── */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #121826;
      color: #ffffff;
      line-height: 1.5;
      overflow-x: hidden;
    }

    /* Animated Background (matching landing page) */
    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: -1;
    }

    .bg-animation div {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      animation: float 25s infinite ease-in-out;
    }

    .bg-animation div:nth-child(1) { 
      top: 10%; left: -5%; width: 500px; height: 500px; animation-delay: 0s; 
      background: radial-gradient(circle, rgba(249,115,22,0.12), transparent);
    }
    .bg-animation div:nth-child(2) { 
      bottom: 10%; right: -5%; width: 600px; height: 600px; animation-delay: -8s; 
      background: radial-gradient(circle, rgba(236,72,153,0.08), transparent);
    }
    .bg-animation div:nth-child(3) { 
      top: 40%; right: 20%; width: 350px; height: 350px; animation-delay: -15s; 
      background: radial-gradient(circle, rgba(6,182,212,0.08), transparent);
    }
    .bg-animation div:nth-child(4) { 
      bottom: 30%; left: 15%; width: 450px; height: 450px; animation-delay: -22s; 
      background: radial-gradient(circle, rgba(168,85,247,0.06), transparent);
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(40px, -40px) scale(1.05); }
      66% { transform: translate(-30px, 30px) scale(0.95); }
    }

    /* ── Override theme variables (orange/dark) ──────────────── */
    :root {
      --sidebar-w: 250px;
      --primary:   #f97316;
      --primary-d: #f97316;
      --primary-bg: rgba(249,115,22,0.15);
      --nav-h: 0px;
    }

    html, body { height:100%; background:#121826; -webkit-font-smoothing:antialiased; overflow:hidden; }

    /* ── Shell ───────────────────────────────────── */
    .p-shell { display:flex; height:100vh; overflow:hidden; }

    /* ── Sidebar (dark theme) ─────────────────────── */
    .b-sidebar {
      width: var(--sidebar-w); flex-shrink: 0;
      background: rgba(18, 24, 38, 0.8);
      backdrop-filter: blur(20px);
      border-right: 1px solid rgba(249,115,22,0.2);
      display: flex; flex-direction: column; height: 100vh; overflow: hidden;
    }
    .b-sidebar-logo {
      padding: 20px 20px 18px; display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid rgba(249,115,22,0.2); flex-shrink: 0; text-decoration: none;
    }
    .b-sidebar-logo img { height:40px; width:auto; display:block; flex-shrink:0; filter: brightness(0) invert(1); }
    .b-logo-name { 
      font-weight:800; font-size:1rem; 
      background: linear-gradient(135deg, #f97316, #f43f5e, #06b6d4);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      white-space:nowrap; 
    }
    .b-sidebar-section { 
      padding:20px 20px 8px; font-size:.68rem; font-weight:700; 
      color:#94a3b8; text-transform:uppercase; letter-spacing:.08em; flex-shrink:0; 
    }
    .b-sidebar-nav { flex:1; overflow-y:auto; padding:4px 12px 12px; }
    .b-nav-item {
      display: flex; align-items: center; gap: 12px; width: 100%; padding: 11px 14px;
      border: none; border-radius: 10px; background: transparent; color: #cbd5e1;
      font-size: .88rem; font-weight: 500; font-family: 'Inter',sans-serif !important;
      cursor: pointer; text-align: left; text-decoration: none;
      transition: all 0.2s; margin-bottom: 3px;
    }
    .b-nav-item:hover { background: rgba(249,115,22,0.15); color: #f97316; }
    .b-nav-item.active { background: rgba(249,115,22,0.2); color: #f97316; font-weight:700; border-left: 3px solid #f97316; }
    .b-nav-icon { width:18px; height:18px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .b-nav-icon svg { fill: currentColor; }
    .b-sidebar-divider { height:1px; background: rgba(249,115,22,0.2); margin:8px 12px; }
    .b-sidebar-footer {
      padding: 16px 20px; border-top: 1px solid rgba(249,115,22,0.2);
      display: flex; align-items: center; gap: 12px; flex-shrink: 0;
    }
    .b-sf-info { min-width:0; }
    .b-sf-name { font-weight:700; font-size:.84rem; color:white; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .b-sf-sub  { font-size:.73rem; color:#f97316; font-weight:600; }

    /* ── Main scroll area (dark) ────────────────────────── */
    .p-main {
      flex: 1; display: flex; flex-direction: column;
      height: 100vh; overflow: hidden; min-width: 0;
      background: transparent;
    }
    .p-header {
      padding: 16px 28px 14px; background: rgba(18, 24, 38, 0.6);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(249,115,22,0.15);
      flex-shrink: 0;
    }
    .p-eyebrow { font-size:.68rem; font-weight:700; color:#f97316; text-transform:uppercase; letter-spacing:.06em; margin-bottom:3px; }
    .p-header h1 { 
      font-size:1.35rem; font-weight:800; 
      background: linear-gradient(135deg, #f97316, #f43f5e, #06b6d4);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing:-.03em; 
    }
    .p-scroll { flex:1; overflow-y:auto; padding:28px; }
    .p-scroll::-webkit-scrollbar { width:6px; }
    .p-scroll::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
    .p-scroll::-webkit-scrollbar-thumb { background: #f97316; border-radius: 10px; }

    /* ── Profile card styling (dark) ───────────────── */
    .profile-card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(249,115,22,0.2);
      border-radius: 32px;
      padding: 32px;
      margin-bottom: 32px;
    }
    .profile-header {
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }
    .avatar-large {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #f97316, #f43f5e);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: 800;
      color: white;
      box-shadow: 0 0 20px rgba(249,115,22,0.3);
    }
    .profile-info h2 {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 8px;
      color: white;
    }
    .profile-badge {
      display: inline-block;
      background: rgba(249,115,22,0.2);
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 12px;
      font-weight: 600;
      color: #f97316;
    }
    .stats-grid {
      display: flex;
      gap: 24px;
      margin: 24px 0;
      flex-wrap: wrap;
    }
    .stat-card {
      background: rgba(0,0,0,0.3);
      border-radius: 20px;
      padding: 16px 24px;
      text-align: center;
      flex: 1;
      border: 1px solid rgba(249,115,22,0.15);
    }
    .stat-number {
      font-size: 28px;
      font-weight: 800;
      color: #f97316;
    }
    .stat-label {
      font-size: 12px;
      color: #94a3b8;
    }
    .listings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)) !important;
      gap: 24px;
      margin-top: 20px;
    }
    .listing-item {
      background: rgba(255,255,255,0.04);
      border-radius: 20px;
      padding: 16px;
      border: 1px solid rgba(249,115,22,0.1);
      transition: 0.2s;
    }
    .listing-item:hover {
      transform: translateY(-4px);
      border-color: #f97316;
      background: rgba(249,115,22,0.05);
    }
    .loading-wrap {
      text-align: center;
      padding: 60px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(249,115,22,0.2);
      border-top: 3px solid #f97316;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    #toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    @media (max-width:768px) {
      html, body { height: auto; overflow-y: auto; }
      .p-shell { height: auto; min-height: 100vh; overflow: visible; }
      .p-main { height: auto; overflow: visible; }
      .p-scroll { overflow: visible; height: auto; padding:16px; }
      .b-sidebar { display:none; }
    }
  </style>
</head>
<body>
