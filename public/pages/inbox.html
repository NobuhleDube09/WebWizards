<!doctype html>
<html lang="en">
<head>
  <script>(function(){if(localStorage.getItem("cc_theme")==="dark")document.documentElement.setAttribute("data-theme","dark");}());</script>
  <link rel="stylesheet" href="/css/dark.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/assets/campus_logo.svg" type="image/svg+xml">
  <title>Inbox &mdash; CampusConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --primary:    #00C97F;
      --primary-d:  #00a868;
      --primary-bg: #e6fff4;
      --text:       #111827;
      --text-2:     #4b5563;
      --text-3:     #9ca3af;
      --border:     #e5e7eb;
      --bg:         #f3f5f4;
      --sidebar-w:  250px;
      --brand:         #00C97F;
      --brand-dim:     rgba(0,201,127,0.1);
      --text-primary:  #111827;
      --text-secondary:#4b5563;
      --text-muted:    #9ca3af;
      --bg-card:       #ffffff;
      --bg-card-hover: #fafcfa;
      --radius-lg:     20px;
      --radius-full:   999px;
      --transition:    all 0.2s cubic-bezier(0.4,0,0.2,1);
      --shadow-sm:     0 1px 4px rgba(0,0,0,0.06);
      --accent-dim:    rgba(255,107,107,0.15);
      --accent:        #ff6b6b;
    }

    html, body { height:100%; font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; }

    .i-shell { display:flex; height:100vh; overflow:hidden; }

    .b-sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: #fff;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    .b-sidebar-logo {
      padding: 20px 20px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      text-decoration: none;
    }
    .b-sidebar-logo img { height:40px; width:auto; display:block; flex-shrink:0; }
    .b-logo-name { font-weight:800; font-size:1rem; color:var(--text); letter-spacing:-.02em; white-space:nowrap; }
    .b-sidebar-section { padding:20px 20px 8px; font-size:.68rem; font-weight:700; color:var(--text-3); text-transform:uppercase; letter-spacing:.08em; flex-shrink:0; }
    .b-sidebar-nav { flex:1; overflow-y:auto; padding:4px 12px 12px; }
    .b-nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 11px 14px;
      border: none;
      border-radius: 10px;
      background: transparent;
      color: var(--text-2);
      font-size: .88rem;
      font-weight: 500;
      font-family: 'Inter',sans-serif;
      cursor: pointer;
      text-align: left;
      text-decoration: none;
      transition: background .15s, color .15s;
      margin-bottom: 3px;
    }
    .b-nav-item:hover { background:#f3f5f4; color:var(--text); }
    .b-nav-item.active { background:var(--primary-bg); color:var(--primary-d); font-weight:700; }
    .b-nav-item.active .b-nav-icon { color:var(--primary); }
    .b-nav-icon { width:18px; height:18px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .b-sidebar-divider { height:1px; background:var(--border); margin:8px 12px; }
    .b-sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .b-sf-info { min-width:0; }
    .b-sf-name { font-weight:700; font-size:.84rem; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .b-sf-sub  { font-size:.73rem; color:var(--primary-d); font-weight:600; }

    .i-main {
      flex: 1;
      display: flex;
      height: 100vh;
      overflow: hidden;
      min-width: 0;
    }

    .i-conv-panel {
      width: 300px;
      flex-shrink: 0;
      background: #fff;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .i-conv-header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .i-conv-header h2 { font-size:1rem; font-weight:800; color:var(--text); margin-bottom:10px; letter-spacing:-.02em; }
    .i-search-wrap { position:relative; }
    .i-search-icon { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--text-3); display:flex; pointer-events:none; }
    #chatSearch {
      width: 100%;
      padding: 9px 12px 9px 32px;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      background: var(--bg);
      font-size: .84rem;
      font-family: 'Inter',sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color .15s;
    }
    #chatSearch:focus { border-color:var(--primary); background:#fff; }
    #chatSearch::placeholder { color:var(--text-3); }

    .chat-list { flex:1; overflow-y:auto; padding:8px; }
    .chat-item {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 11px 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: background .15s;
      position: relative;
    }
    .chat-item:hover { background:var(--bg); }
    .chat-item.active { background:var(--primary-bg); }
    .chat-item.unread::after {
      content:'';
      position:absolute; right:12px; top:50%; transform:translateY(-50%);
      width:8px; height:8px; border-radius:50%; background:var(--primary);
    }
    .chat-item-info { min-width:0; flex:1; }
    .chat-item-name { font-weight:600; font-size:.86rem; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .chat-item-preview { font-size:.78rem; color:var(--text-3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }

    .chat-thread {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
      background: var(--bg);
      min-width: 0;
    }
    .chat-thread-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      background: #fff;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .chat-thread-name { font-weight:700; font-size:.95rem; color:var(--text); }

    .chat-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      text-align: center;
      padding: 3rem;
    }
    .chat-empty-icon {
      width:60px; height:60px; border-radius:16px;
      background:var(--primary-bg); color:var(--primary);
      display:flex; align-items:center; justify-content:center;
    }
    .chat-empty h3 { font-size:1.05rem; font-weight:800; color:var(--text); letter-spacing:-.02em; }
    .chat-empty p  { font-size:.85rem; color:var(--text-2); max-width:260px; line-height:1.55; }

    .bubble-row { display:flex; }
    .bubble-row.self  { justify-content:flex-end; }
    .bubble-row.other { justify-content:flex-start; }
    .bubble {
      max-width: 70%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: .87rem;
      line-height: 1.5;
      word-break: break-word;
    }
    .bubble.self  { background:var(--primary); color:#fff; border-bottom-right-radius:4px; }
    .bubble.other { background:#fff; color:var(--text); border:1px solid var(--border); border-bottom-left-radius:4px; }

    .chat-input-row {
      display: flex;
      gap: 10px;
      padding: 14px 16px;
      background: #fff;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .chat-input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: .88rem;
      font-family: 'Inter',sans-serif;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color .15s;
    }
    .chat-input-row input:focus { border-color:var(--primary); background:#fff; }
    .chat-input-row input::placeholder { color:var(--text-3); }

    .btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:9px; font-size:.83rem; font-weight:600; font-family:'Inter',sans-serif; cursor:pointer; text-decoration:none; border:none; transition:background .15s; }
    .btn-primary { background:var(--primary); color:#fff; box-shadow:0 2px 8px rgba(0,201,127,.25); }
    .btn-primary:hover { background:var(--primary-d); }
    .btn-sm { padding:8px 16px; font-size:.82rem; }

    .avatar { border-radius:50%; object-fit:cover; flex-shrink:0; display:block; }
    .avatar-xs  { width:28px; height:28px; }
    .avatar-sm  { width:40px; height:40px; }
    .avatar-md  { width:56px; height:56px; }
    .avatar-init { background:var(--primary-bg); color:var(--primary-d); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:.75rem; font-family:'Inter',sans-serif; }

    .loading-wrap { display:flex; justify-content:center; padding:3rem; }
    .spinner { width:28px; height:28px; border-radius:50%; border:3px solid var(--border); border-top-color:var(--primary); animation:spin .7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    #toast-container { position:fixed; bottom:20px; right:20px; z-index:9999; display:flex; flex-direction:column; gap:8px; }
    .toast { background:#1f2937; color:#fff; padding:11px 18px; border-radius:10px; font-size:.84rem; font-weight:500; font-family:'Inter',sans-serif; animation:toastIn .25s ease forwards; box-shadow:0 4px 16px rgba(0,0,0,.18); }
    .toast.out { animation:toastOut .3s ease forwards; }
    @keyframes toastIn  { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
    @keyframes toastOut { from{opacity:1} to{opacity:0;transform:translateY(6px)} }

    @media (max-width:768px) {
      html, body { height: auto; overflow-y: auto; }
      .i-shell { height: auto; min-height: 100vh; overflow: visible; }
      .b-sidebar { display:none; }
      .i-conv-panel { width:240px; }
    }
    @media (max-width:520px)  { .i-conv-panel { display:none; } }
  </style>
</head>
<body>
<div class="i-shell">

  <aside class="b-sidebar">
    <a class="b-sidebar-logo" href="/">
      <img src="/assets/logo_2.svg" alt="CampusConnect">
      <span class="b-logo-name">CampusConnect</span>
    </a>
    <div class="b-sidebar-section">Navigate</div>
    <nav class="b-sidebar-nav">
      <a class="b-nav-item" href="/pages/browse.html">
        <span class="b-nav-icon"><svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/></svg></span>
        Browse
      </a>
      <a class="b-nav-item" href="/pages/dashboard.html">
        <span class="b-nav-icon"><svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path d="M3 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h6a1 1 0 110 2H4a1 1 0 01-1-1z"/></svg></span>
        Dashboard
      </a>
      <a class="b-nav-item active" href="/pages/inbox.html">
        <span class="b-nav-icon"><svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/><path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/></svg></span>
        Inbox
      </a>
      <a class="b-nav-item" href="/pages/leaderboard.html">
        <span class="b-nav-icon"><svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg></span>
        Leaderboard
      </a>
      <div class="b-sidebar-divider"></div>
      <a class="b-nav-item" href="/pages/listing-form.html">
        <span class="b-nav-icon"><svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/></svg></span>
        List a service
      </a>
    </nav>
    <div class="b-sidebar-footer" id="sidebarFooter" style="display:none">
      <div id="sidebarAvatarWrap"></div>
      <div class="b-sf-info">
        <div class="b-sf-name" id="sidebarName"></div>
        <div class="b-sf-sub"  id="sidebarRank"></div>
      </div>
    </div>
  </aside>

  <div class="i-main">
    <div class="i-conv-panel">
      <div class="i-conv-header">
        <h2>Messages</h2>
        <div class="i-search-wrap">
          <span class="i-search-icon">
            <svg viewBox="0 0 20 20" fill="currentColor" width="14" height="14"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/></svg>

          <input type="text" id="chatSearch" placeholder="Search conversations...">

      </div>
      <div class="chat-list" id="chatList">
        <div class="loading-wrap"><div class="spinner"></div></div>
      </div>

    <div class="chat-thread" id="chatThread">
      <div class="chat-empty">
        <span class="chat-empty-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>

        <p>Select a conversation to start chatting.</p>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script src="/js/inbox.js"></script>

</html>
