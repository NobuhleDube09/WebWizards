<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Inbox — CampusConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #121826;
      color: #ffffff;
      line-height: 1.5;
      overflow: hidden;
      height: 100vh;
    }

    /* Animated Background */
    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: -1;
    }

    .bg-animation div {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      animation: float 25s infinite ease-in-out;
    }

    .bg-animation div:nth-child(1) { 
      top: 10%; left: -5%; width: 500px; height: 500px; animation-delay: 0s; 
      background: radial-gradient(circle, rgba(249,115,22,0.12), transparent);
    }
    .bg-animation div:nth-child(2) { 
      bottom: 10%; right: -5%; width: 600px; height: 600px; animation-delay: -8s; 
      background: radial-gradient(circle, rgba(236,72,153,0.08), transparent);
    }
    .bg-animation div:nth-child(3) { 
      top: 40%; right: 20%; width: 350px; height: 350px; animation-delay: -15s; 
      background: radial-gradient(circle, rgba(6,182,212,0.08), transparent);
    }
    .bg-animation div:nth-child(4) { 
      bottom: 30%; left: 15%; width: 450px; height: 450px; animation-delay: -22s; 
      background: radial-gradient(circle, rgba(168,85,247,0.06), transparent);
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(40px, -40px) scale(1.05); }
      66% { transform: translate(-30px, 30px) scale(0.95); }
    }

    /* Sidebar Layout */
    .b-shell {
      display: flex;
      height: 100vh;
      overflow: hidden;
      position: relative;
      z-index: 2;
    }

    .b-sidebar {
      width: 260px;
      flex-shrink: 0;
      background: rgba(18, 24, 38, 0.95);
      backdrop-filter: blur(12px);
      border-right: 1px solid rgba(249,115,22,0.25);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .b-sidebar-logo {
      padding: 24px 20px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(249,115,22,0.25);
      flex-shrink: 0;
      text-decoration: none;
    }

    .b-sidebar-logo img {
      height: 40px;
      width: auto;
      display: block;
    }

    .b-logo-name {
      font-weight: 800;
      font-size: 1.1rem;
      background: linear-gradient(135deg, #f97316, #f43f5e, #06b6d4);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.02em;
    }

    .b-sidebar-section {
      padding: 24px 20px 8px;
      font-size: 0.7rem;
      font-weight: 700;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      flex-shrink: 0;
    }

    .b-sidebar-nav {
      flex: 1;
      overflow-y: auto;
      padding: 4px 12px 12px;
    }

    .b-sidebar-nav::-webkit-scrollbar {
      width: 3px;
    }

    .b-sidebar-nav::-webkit-scrollbar-thumb {
      background: rgba(249,115,22,0.4);
      border-radius: 99px;
    }

    .b-nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 11px 14px;
      border: none;
      border-radius: 12px;
      background: transparent;
      color: #cbd5e1;
      font-size: 0.88rem;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      text-align: left;
      text-decoration: none;
      transition: all 0.2s ease;
      margin-bottom: 4px;
    }

    .b-nav-item:hover {
      background: rgba(249,115,22,0.12);
      color: #f97316;
    }

    .b-nav-item.active {
      background: rgba(249,115,22,0.18);
      color: #f97316;
      font-weight: 700;
    }

    .b-nav-icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .b-sidebar-divider {
      height: 1px;
      background: rgba(249,115,22,0.2);
      margin: 12px 12px;
    }

    .logout-item {
      margin-top: auto;
      border-top: 1px solid rgba(249,115,22,0.2);
      margin-top: 16px;
      padding-top: 12px;
    }
    
    .logout-item .b-nav-item {
      color: #f87171;
    }
    
    .logout-item .b-nav-item:hover {
      background: rgba(248,113,113,0.12);
      color: #ff9f9f;
    }

    .b-sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid rgba(249,115,22,0.25);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .b-sf-info {
      min-width: 0;
    }
    
    .b-sf-name {
      font-weight: 700;
      font-size: 0.84rem;
      color: #ffffff;
    }
    
    .b-sf-sub {
      font-size: 0.73rem;
      color: #f97316;
      font-weight: 600;
    }

    /* Main Inbox Layout */
    .i-main {
      flex: 1;
      display: flex;
      height: 100vh;
      overflow: hidden;
      min-width: 0;
    }

    /* Conversations Panel */
    .i-conv-panel {
      width: 320px;
      flex-shrink: 0;
      background: rgba(18, 24, 38, 0.8);
      backdrop-filter: blur(8px);
      border-right: 1px solid rgba(249,115,22,0.2);
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .i-conv-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid rgba(249,115,22,0.2);
      flex-shrink: 0;
    }

    .i-conv-header h2 {
      font-size: 1.2rem;
      font-weight: 800;
      color: #ffffff;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }

    .i-search-wrap {
      position: relative;
    }

    .i-search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      display: flex;
      pointer-events: none;
    }

    #chatSearch {
      width: 100%;
      padding: 10px 12px 10px 38px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(249,115,22,0.3);
      border-radius: 12px;
      font-size: 0.85rem;
      font-family: 'Inter', sans-serif;
      color: #ffffff;
      outline: none;
      transition: all 0.2s;
    }

    #chatSearch:focus {
      border-color: #f97316;
      background: rgba(0, 0, 0, 0.5);
    }

    #chatSearch::placeholder {
      color: #6c7a91;
    }

    /* Chat List */
    .chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .chat-list::-webkit-scrollbar {
      width: 4px;
    }

    .chat-list::-webkit-scrollbar-thumb {
      background: rgba(249,115,22,0.3);
      border-radius: 99px;
    }

    .chat-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      margin-bottom: 4px;
    }

    .chat-item:hover {
      background: rgba(249,115,22,0.1);
    }

    .chat-item.active {
      background: rgba(249,115,22,0.18);
      border: 1px solid rgba(249,115,22,0.3);
    }

    .chat-item.unread::after {
      content: '';
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f97316;
    }

    .chat-avatar {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #f97316, #f43f5e);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 18px;
      color: white;
      flex-shrink: 0;
    }

    .chat-item-info {
      min-width: 0;
      flex: 1;
    }

    .chat-item-name {
      font-weight: 700;
      font-size: 0.9rem;
      color: #ffffff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-item-preview {
      font-size: 0.8rem;
      color: #94a3b8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 4px;
    }

    .chat-item-time {
      font-size: 0.7rem;
      color: #6c7a91;
      margin-top: 4px;
    }

    /* Chat Thread */
    .chat-thread {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
      background: rgba(18, 24, 38, 0.6);
      min-width: 0;
    }

    .chat-thread-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 24px;
      background: rgba(18, 24, 38, 0.9);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(249,115,22,0.2);
      flex-shrink: 0;
    }

    .chat-thread-avatar {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #f97316, #f43f5e);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
      color: white;
    }

    .chat-thread-name {
      font-weight: 800;
      font-size: 1rem;
      color: #ffffff;
    }

    .chat-thread-status {
      font-size: 0.75rem;
      color: #2dd4bf;
      margin-top: 2px;
    }

    /* Chat Messages */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .chat-messages::-webkit-scrollbar {
      width: 4px;
    }

    .chat-messages::-webkit-scrollbar-thumb {
      background: rgba(249,115,22,0.3);
      border-radius: 99px;
    }

    .message-row {
      display: flex;
    }

    .message-row.self {
      justify-content: flex-end;
    }

    .message-row.other {
      justify-content: flex-start;
    }

    .message-bubble {
      max-width: 70%;
      padding: 10px 16px;
      border-radius: 20px;
      font-size: 0.88rem;
      line-height: 1.5;
      word-break: break-word;
    }

    .message-bubble.self {
      background: linear-gradient(135deg, #f97316, #f43f5e);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message-bubble.other {
      background: rgba(255, 255, 255, 0.08);
      color: #e2e8f0;
      border: 1px solid rgba(249,115,22,0.2);
      border-bottom-left-radius: 4px;
    }

    .message-time {
      font-size: 0.65rem;
      color: #6c7a91;
      margin-top: 4px;
      margin-left: 8px;
    }

    /* Chat Input */
    .chat-input-row {
      display: flex;
      gap: 12px;
      padding: 16px 24px;
      background: rgba(18, 24, 38, 0.9);
      backdrop-filter: blur(8px);
      border-top: 1px solid rgba(249,115,22,0.2);
      flex-shrink: 0;
    }

    .chat-input-row input {
      flex: 1;
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(249,115,22,0.3);
      border-radius: 40px;
      font-size: 0.88rem;
      font-family: 'Inter', sans-serif;
      color: #ffffff;
      outline: none;
      transition: all 0.2s;
    }

    .chat-input-row input:focus {
      border-color: #f97316;
      background: rgba(0, 0, 0, 0.5);
    }

    .chat-input-row input::placeholder {
      color: #6c7a91;
    }

    .send-btn {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #f97316, #f43f5e);
      border: none;
      border-radius: 50%;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .send-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 12px rgba(249,115,22,0.4);
    }

    /* Empty State */
    .chat-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      text-align: center;
      padding: 2rem;
    }

    .chat-empty-icon {
      width: 70px;
      height: 70px;
      background: rgba(249,115,22,0.12);
      border-radius: 50%;
      color: #f97316;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }

    .chat-empty h3 {
      font-size: 1.1rem;
      font-weight: 800;
      color: #ffffff;
    }

    .chat-empty p {
      font-size: 0.85rem;
      color: #94a3b8;
      max-width: 280px;
    }

    /* Loader */
    .loading-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(249,115,22,0.2);
      border-top-color: #f97316;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Toast */
    #toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      background: rgba(30, 41, 59, 0.95);
      backdrop-filter: blur(8px);
      color: white;
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 0.85rem;
      font-weight: 500;
      border-left: 3px solid #f97316;
      animation: toastIn 0.25s ease forwards;
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: none; }
    }

    /* Responsive */
    @media (max-width: 860px) {
      .b-sidebar {
        width: 72px;
      }
      .b-nav-item span:not(.b-nav-icon), .b-logo-name, .b-sidebar-section, .b-sf-info {
        display: none;
      }
      .b-sidebar-logo {
        justify-content: center;
      }
      .i-conv-panel {
        width: 280px;
      }
    }

    @media (max-width: 640px) {
      .i-conv-panel {
        display: none;
      }
    }
  </style>
</head>
<body>
<div class="bg-animation">
  <div></div>
  <div></div>
  <div></div>
  <div></div>
</div>

<div class="b-shell">
  <aside class="b-sidebar">
    <a class="b-sidebar-logo" href="/">
      <img src="/assets/logo_2.svg" alt="CampusConnect">
      <span class="b-logo-name">CampusConnect</span>
    </a>
    <div class="b-sidebar-section">NAVIGATE</div>
    <nav class="b-sidebar-nav">
      <a class="b-nav-item" href="/pages/browse.html">
        <span class="b-nav-icon"><i class="fas fa-search"></i></span>
        <span>Browse</span>
      </a>
      <a class="b-nav-item" href="/pages/dashboard.html">
        <span class="b-nav-icon"><i class="fas fa-th-large"></i></span>
        <span>Dashboard</span>
      </a>
      <a class="b-nav-item active" href="/pages/inbox.html">
        <span class="b-nav-icon"><i class="fas fa-envelope"></i></span>
        <span>Inbox</span>
      </a>
      <a class="b-nav-item" href="/pages/leaderboard.html">
        <span class="b-nav-icon"><i class="fas fa-trophy"></i></span>
        <span>Leaderboard</span>
      </a>
      <div class="b-sidebar-divider"></div>
      <a class="b-nav-item" href="/pages/listing-form.html">
        <span class="b-nav-icon"><i class="fas fa-plus-circle"></i></span>
        <span>List a service</span>
      </a>
      <div class="logout-item">
        <div class="b-sidebar-divider"></div>
        <a class="b-nav-item" id="logoutBtn" href="#">
          <span class="b-nav-icon"><i class="fas fa-sign-out-alt"></i></span>
          <span>Log out</span>
        </a>
      </div>
    </nav>
    <div class="b-sidebar-footer" id="sidebarFooter" style="display: none;">
      <div id="sidebarAvatarWrap"></div>
      <div class="b-sf-info">
        <div class="b-sf-name" id="sidebarName"></div>
        <div class="b-sf-sub" id="sidebarRank"></div>
      </div>
    </div>
  </aside>

  <div class="i-main">
    <div class="i-conv-panel">
      <div class="i-conv-header">
        <h2><i class="fas fa-comment-dots" style="color:#f97316; margin-right:8px;"></i> Messages</h2>
        <div class="i-search-wrap">
          <span class="i-search-icon"><i class="fas fa-search"></i></span>
          <input type="text" id="chatSearch" placeholder="Search conversations...">
        </div>
      </div>
      <div class="chat-list" id="chatList">
        <!-- inbox.js will populate conversations here -->
      </div>
    </div>

    <div class="chat-thread" id="chatThread">
      <div class="chat-empty">
        <div class="chat-empty-icon"><i class="fas fa-inbox"></i></div>
        <h3>Your messages</h3>
        <p>Select a conversation to start chatting with fellow students.</p>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/config.js"></script>
<script>window.sbClient = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON);</script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/common.js"></script>
<script src="/js/inbox.js"></script>
</body>
</html>
