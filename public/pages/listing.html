<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Listing — CampusConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #121826;
      color: #ffffff;
      line-height: 1.5;
      overflow: hidden;
      height: 100vh;
    }

    /* Animated Background */
    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: -1;
    }

    .bg-animation div {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      animation: float 25s infinite ease-in-out;
    }

    .bg-animation div:nth-child(1) { 
      top: 10%; left: -5%; width: 500px; height: 500px; animation-delay: 0s; 
      background: radial-gradient(circle, rgba(249,115,22,0.12), transparent);
    }
    .bg-animation div:nth-child(2) { 
      bottom: 10%; right: -5%; width: 600px; height: 600px; animation-delay: -8s; 
      background: radial-gradient(circle, rgba(236,72,153,0.08), transparent);
    }
    .bg-animation div:nth-child(3) { 
      top: 40%; right: 20%; width: 350px; height: 350px; animation-delay: -15s; 
      background: radial-gradient(circle, rgba(6,182,212,0.08), transparent);
    }
    .bg-animation div:nth-child(4) { 
      bottom: 30%; left: 15%; width: 450px; height: 450px; animation-delay: -22s; 
      background: radial-gradient(circle, rgba(168,85,247,0.06), transparent);
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(40px, -40px) scale(1.05); }
      66% { transform: translate(-30px, 30px) scale(0.95); }
    }

    /* Sidebar Layout */
    .b-shell {
      display: flex;
      height: 100vh;
      overflow: hidden;
      position: relative;
      z-index: 2;
    }

    .b-sidebar {
      width: 260px;
      flex-shrink: 0;
      background: rgba(18, 24, 38, 0.95);
      backdrop-filter: blur(12px);
      border-right: 1px solid rgba(249,115,22,0.25);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .b-sidebar-logo {
      padding: 24px 20px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(249,115,22,0.25);
      flex-shrink: 0;
      text-decoration: none;
    }

    .b-sidebar-logo img {
      height: 40px;
      width: auto;
      display: block;
    }

    .b-logo-name {
      font-weight: 800;
      font-size: 1.1rem;
      background: linear-gradient(135deg, #f97316, #f43f5e, #06b6d4);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.02em;
    }

    .b-sidebar-section {
      padding: 24px 20px 8px;
      font-size: 0.7rem;
      font-weight: 700;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      flex-shrink: 0;
    }

    .b-sidebar-nav {
      flex: 1;
      overflow-y: auto;
      padding: 4px 12px 12px;
    }

    .b-sidebar-nav::-webkit-scrollbar {
      width: 3px;
    }

    .b-sidebar-nav::-webkit-scrollbar-thumb {
      background: rgba(249,115,22,0.4);
      border-radius: 99px;
    }

    .b-nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 11px 14px;
      border: none;
      border-radius: 12px;
      background: transparent;
      color: #cbd5e1;
      font-size: 0.88rem;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      text-align: left;
      text-decoration: none;
      transition: all 0.2s ease;
      margin-bottom: 4px;
    }

    .b-nav-item:hover {
      background: rgba(249,115,22,0.12);
      color: #f97316;
    }

    .b-nav-item.active {
      background: rgba(249,115,22,0.18);
      color: #f97316;
      font-weight: 700;
    }

    .b-nav-icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .b-sidebar-divider {
      height: 1px;
      background: rgba(249,115,22,0.2);
      margin: 12px 12px;
    }

    .logout-item {
      margin-top: auto;
      border-top: 1px solid rgba(249,115,22,0.2);
      margin-top: 16px;
      padding-top: 12px;
    }
    
    .logout-item .b-nav-item {
      color: #f87171;
    }
    
    .logout-item .b-nav-item:hover {
      background: rgba(248,113,113,0.12);
      color: #ff9f9f;
    }

    .b-sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid rgba(249,115,22,0.25);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .b-sf-info {
      min-width: 0;
    }
    
    .b-sf-name {
      font-weight: 700;
      font-size: 0.84rem;
      color: #ffffff;
    }
    
    .b-sf-sub {
      font-size: 0.73rem;
      color: #f97316;
      font-weight: 600;
    }

    .b-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      min-width: 0;
    }

    .b-main-header {
      padding: 14px 28px 12px;
      background: rgba(18, 24, 38, 0.85);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(249,115,22,0.2);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .b-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 28px 32px 40px;
    }

    .b-scroll::-webkit-scrollbar {
      width: 5px;
    }
    
    .b-scroll::-webkit-scrollbar-thumb {
      background: rgba(249,115,22,0.4);
      border-radius: 99px;
    }

    /* Back button */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      border: 1px solid rgba(249,115,22,0.5);
      color: #f97316;
      padding: 6px 20px;
      border-radius: 40px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }
    
    .back-btn:hover {
      background: rgba(249,115,22,0.12);
      border-color: #f97316;
      transform: translateX(-2px);
    }

    /* Listing Grid */
    .listing-detail-grid {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 28px;
    }

    /* Cards */
    .info-card {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(2px);
      border: 1px solid rgba(249,115,22,0.2);
      border-radius: 28px;
      margin-bottom: 24px;
      overflow: hidden;
    }

    .info-card h2 {
      font-size: 1rem;
      font-weight: 800;
      color: #ffffff;
      margin: 0;
      padding: 20px 24px 8px 24px;
      letter-spacing: -0.3px;
    }

    .info-card-content {
      padding: 8px 24px 24px 24px;
    }

    /* Gallery */
    .main-img {
      width: 100%;
      height: 340px;
      object-fit: cover;
      display: block;
      background: #1a1f2e;
    }

    .thumb-row {
      display: flex;
      gap: 10px;
      padding: 14px 20px;
      overflow-x: auto;
      background: rgba(0, 0, 0, 0.3);
    }
    
    .thumb {
      width: 80px;
      height: 60px;
      object-fit: cover;
      border-radius: 12px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: 0.2s;
      opacity: 0.7;
      background: #1a1f2e;
    }
    
    .thumb.active {
      border-color: #f97316;
      opacity: 1;
    }

    /* Badges */
    .cat-badge {
      background: rgba(249,115,22,0.18);
      color: #f97316;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 100px;
      border: 1px solid rgba(249,115,22,0.35);
      display: inline-block;
    }
    
    .avail-badge {
      background: rgba(6, 182, 212, 0.15);
      color: #2dd4bf;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 100px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    /* Seller */
    .seller-flex {
      display: flex;
      align-items: center;
      gap: 18px;
    }
    
    .seller-avatar {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #f97316, #f43f5e);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
      color: white;
    }

    /* Stars */
    .stars i {
      color: #fbbf24;
      font-size: 12px;
      margin-right: 2px;
    }
    .stars .far {
      color: #4b5563;
    }

    /* Chips */
    .chips-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }
    
    .chip {
      background: rgba(249,115,22,0.1);
      border: 1px solid rgba(249,115,22,0.3);
      padding: 5px 14px;
      border-radius: 30px;
      font-size: 12px;
      color: #fcd34d;
    }

    /* Reviews */
    .review-item {
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding: 16px 0;
    }
    .review-item:last-child {
      border-bottom: none;
    }
    
    .review-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    
    .reviewer-name {
      font-weight: 600;
      font-size: 14px;
      color: #e2e8f0;
    }
    
    .review-date {
      font-size: 11px;
      color: #6c7a91;
    }
    
    .review-comment {
      font-size: 13px;
      color: #cbd5e6;
      line-height: 1.5;
      margin-top: 6px;
    }

    /* Booking Card */
    .booking-card {
      background: rgba(18, 24, 38, 0.95);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(249,115,22,0.3);
      border-radius: 28px;
      padding: 28px 24px;
      position: sticky;
      top: 20px;
    }
    
    .price {
      font-size: 40px;
      font-weight: 800;
      background: linear-gradient(135deg, #f97316, #f43f5e);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    
    .divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
      margin: 18px 0;
    }
    
    .booking-input, .booking-textarea {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(249,115,22,0.3);
      border-radius: 14px;
      padding: 10px 14px;
      width: 100%;
      color: white;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
    }
    
    .booking-input:focus, .booking-textarea:focus {
      outline: none;
      border-color: #f97316;
    }
    
    label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #94a3b8;
      display: block;
      margin-bottom: 6px;
    }
    
    .btn-primary {
      background: linear-gradient(95deg, #f97316, #f43f5e);
      border: none;
      padding: 14px;
      width: 100%;
      border-radius: 40px;
      font-weight: 800;
      font-size: 15px;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      margin-bottom: 12px;
    }
    
    .btn-primary:hover {
      transform: scale(1.02);
      box-shadow: 0 0 15px rgba(249,115,22,0.4);
    }
    
    .btn-outline {
      background: transparent;
      border: 1px solid #f97316;
      padding: 12px;
      width: 100%;
      border-radius: 40px;
      font-weight: 600;
      color: #f97316;
      cursor: pointer;
      transition: 0.2s;
    }
    
    .btn-outline:hover {
      background: rgba(249,115,22,0.1);
    }

    /* Loader */
    .loading-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 400px;
    }
    
    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid rgba(249,115,22,0.2);
      border-top: 3px solid #f97316;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 860px) {
      .listing-detail-grid {
        grid-template-columns: 1fr;
      }
      .booking-card {
        position: relative;
        top: 0;
      }
      .b-sidebar {
        width: 72px;
      }
      .b-nav-item span:not(.b-nav-icon), .b-logo-name, .b-sidebar-section, .b-sf-info {
        display: none;
      }
      .b-sidebar-logo {
        justify-content: center;
      }
    }

    @media (max-width: 600px) {
      .b-scroll {
        padding: 16px;
      }
      .main-img {
        height: 220px;
      }
    }
  </style>
</head>
<body>
<div class="b-shell">

  <aside class="b-sidebar">
    <a class="b-sidebar-logo" href="/">
      <img src="/assets/logo_2.svg" alt="CampusConnect">
      <span class="b-logo-name">CampusConnect</span>
    </a>
    <div class="b-sidebar-section">Navigate</div>
    <nav class="b-sidebar-nav">
      <a class="b-nav-item" href="/pages/browse.html">
        <span class="b-nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
        <span>Browse</span>
      </a>
      <a class="b-nav-item" href="/pages/dashboard.html">
        <span class="b-nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></span>
        <span>Dashboard</span>
      </a>
      <a class="b-nav-item" href="/pages/inbox.html">
        <span class="b-nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></span>
        <span>Inbox</span>
      </a>
      <a class="b-nav-item" href="/pages/leaderboard.html">
        <span class="b-nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></span>
        <span>Leaderboard</span>
      </a>
      <div class="b-sidebar-divider"></div>
      <a class="b-nav-item" href="/pages/listing-form.html">
        <span class="b-nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></span>
        <span>List a service</span>
      </a>
    </nav>
    <div class="b-sidebar-footer" id="sidebarFooter" style="display:none">
      <div id="sidebarAvatarWrap"></div>
      <div class="b-sf-info">
        <div class="b-sf-name" id="sidebarName"></div>
        <div class="b-sf-sub"  id="sidebarRank"></div>
      </div>
    </div>
  </aside>

  <main class="b-main">
    <div class="b-main-header">
      <a href="/pages/browse.html" class="btn btn-ghost btn-sm" style="display:inline-flex;align-items:center;gap:6px">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Back to browse
      </a>
    </div>
    <div class="b-scroll">
      <div id="listingContent">
        <div class="loading-wrap"><div class="spinner"></div></div>
      </div>
      <template id="listingTemplate">
        <!-- Listing Header -->
        <div style="margin-bottom:20px">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px">
            <span id="listingCatBadge" style="background:#e6fff4;color:#00965d;font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:100px;border:1px solid rgba(0,201,127,.25)"></span>
            <span id="listingAvailBadge" style="font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:100px"></span>
          </div>
          <h1 id="listingTitle" style="font-size:1.6rem;font-weight:900;color:#111827;margin:0 0 8px;letter-spacing:-.02em;line-height:1.25"></h1>
          <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
            <div style="display:flex;align-items:center;gap:6px" id="listingHeaderRating"></div>
            <div style="display:flex;align-items:center;gap:8px" id="listingHeaderMeta"></div>
          </div>
        </div>

        <div class="listing-detail-grid">
          <!-- LEFT COLUMN -->
          <div>
            <!-- Image Gallery -->
            <div style="background:#fff;border-radius:18px;border:1px solid #e5e7eb;overflow:hidden;margin-bottom:18px" id="galleryWrap">
              <img id="mainImg" style="width:100%;height:340px;object-fit:cover;display:block" src="" alt="">
              <div id="thumbs" style="display:flex;gap:8px;padding:12px 16px;overflow-x:auto;border-top:1px solid #f3f5f4"></div>
            </div>

            <!-- About -->
            <div style="background:#fff;border-radius:18px;border:1px solid #e5e7eb;padding:24px;margin-bottom:18px">
              <h2 style="font-size:1rem;font-weight:800;color:#111827;margin:0 0 14px">About this service</h2>
              <p id="listingDesc" style="font-size:.9rem;color:#4b5563;line-height:1.8;margin:0 0 18px"></p>

              <!-- Service detail chips -->
              <div style="display:flex;gap:10px;flex-wrap:wrap" id="serviceChips"></div>
            </div>

            <!-- Seller card -->
            <div style="background:#fff;border-radius:18px;border:1px solid #e5e7eb;padding:20px;margin-bottom:18px" id="sellerCardWrap">
              <h2 style="font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#9ca3af;margin:0 0 16px">About the seller</h2>
              <div id="sellerCardContent" style="display:flex;align-items:flex-start;gap:14px"></div>
            </div>

            <!-- Reviews -->
            <div style="background:#fff;border-radius:18px;border:1px solid #e5e7eb;padding:24px">
              <h2 style="font-size:1rem;font-weight:800;color:#111827;margin:0 0 16px">Reviews</h2>
              <div id="reviewsList"></div>
            </div>
          </div>

          <!-- RIGHT COLUMN — Booking card -->
          <div>
            <div class="booking-card" style="border-radius:20px;border:1px solid #e5e7eb;box-shadow:0 4px 24px rgba(0,0,0,.07);position:sticky;top:20px">
              <!-- Price -->
              <div style="margin-bottom:16px">
                <div id="bookingPrice" style="font-size:2rem;font-weight:900;color:#111827;letter-spacing:-.03em"></div>
                <div id="bookingPriceType" style="font-size:.8rem;color:#9ca3af;margin-top:2px"></div>
              </div>

              <!-- Rating row -->
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:18px">
                <span id="bookingStars"></span>
                <span style="font-size:.83rem;color:#4b5563" id="bookingRatingText"></span>
              </div>

              <hr style="border:none;border-top:1px solid #f3f5f4;margin:0 0 16px">

              <!-- Seller -->
              <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px" id="bookingSeller"></div>

              <hr style="border:none;border-top:1px solid #f3f5f4;margin:0 0 18px">

              <!-- Booking form -->
              <div style="display:flex;flex-direction:column;gap:12px;margin-bottom:16px">
                <div>
                  <label style="display:block;font-size:.77rem;font-weight:700;color:#374151;margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em">Notes / requirements</label>
                  <textarea id="bookingNotes" rows="3" placeholder="Describe what you need…" style="width:100%;padding:10px 12px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:.88rem;font-family:'Inter',sans-serif;resize:vertical;box-sizing:border-box;outline:none;transition:border .15s" onfocus="this.style.borderColor='#00C97F'" onblur="this.style.borderColor='#e5e7eb'"></textarea>
                </div>
                <div>
                  <label style="display:block;font-size:.77rem;font-weight:700;color:#374151;margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em">Scheduled for (optional)</label>
                  <input type="datetime-local" id="bookingDate" style="width:100%;padding:10px 12px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:.88rem;font-family:'Inter',sans-serif;box-sizing:border-box;outline:none;transition:border .15s" onfocus="this.style.borderColor='#00C97F'" onblur="this.style.borderColor='#e5e7eb'">
                </div>
              </div>

              <button class="btn btn-primary w-full btn-lg" id="bookBtn" style="font-size:.95rem;font-weight:800;padding:14px;border-radius:12px;letter-spacing:-.01em">Book this service</button>
              <button class="btn btn-ghost w-full mt-2" id="msgBtn" style="font-size:.88rem;padding:12px;border-radius:12px">💬 Message seller</button>

              <p style="font-size:.73rem;color:#9ca3af;text-align:center;margin-top:12px;line-height:1.6">
                🔒 You won't be charged until the seller confirms your booking.
              </p>
            </div>
          </div>
        </div>
      </template>
    </div>
  </main>

</div>
<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/config.js"></script>
<script>window.sbClient = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON);</script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/common.js"></script>
<script src="/js/listing.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    try {
      if (!window.Auth?.isLoggedIn?.()) return;
      const user = await window.Auth.getProfile();
      if (!user) return;
      const footer   = document.getElementById('sidebarFooter');
      const avatarEl = document.getElementById('sidebarAvatarWrap');
      const nameEl   = document.getElementById('sidebarName');
      const rankEl   = document.getElementById('sidebarRank');
      if (footer && avatarEl && nameEl) {
        avatarEl.innerHTML = window.avatarHtml ? window.avatarHtml(user, 'sm') : '';
        nameEl.textContent = user.name || 'User';
        if (rankEl) rankEl.textContent = user.rank || '';
        footer.style.display = 'flex';
      }
    } catch (_) {}
  });
</script>
