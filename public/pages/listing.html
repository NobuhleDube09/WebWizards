<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Listing — CampusConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #121826;
      color: #ffffff;
      line-height: 1.5;
      overflow: hidden;
      height: 100vh;
    }

    /* Animated Background */
    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: -1;
    }

    .bg-animation div {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      animation: float 25s infinite ease-in-out;
    }

    .bg-animation div:nth-child(1) { 
      top: 10%; left: -5%; width: 500px; height: 500px; animation-delay: 0s; 
      background: radial-gradient(circle, rgba(249,115,22,0.12), transparent);
    }
    .bg-animation div:nth-child(2) { 
      bottom: 10%; right: -5%; width: 600px; height: 600px; animation-delay: -8s; 
      background: radial-gradient(circle, rgba(236,72,153,0.08), transparent);
    }
    .bg-animation div:nth-child(3) { 
      top: 40%; right: 20%; width: 350px; height: 350px; animation-delay: -15s; 
      background: radial-gradient(circle, rgba(6,182,212,0.08), transparent);
    }
    .bg-animation div:nth-child(4) { 
      bottom: 30%; left: 15%; width: 450px; height: 450px; animation-delay: -22s; 
      background: radial-gradient(circle, rgba(168,85,247,0.06), transparent);
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(40px, -40px) scale(1.05); }
      66% { transform: translate(-30px, 30px) scale(0.95); }
    }

    /* Sidebar Layout */
    .b-shell {
      display: flex;
      height: 100vh;
      overflow: hidden;
      position: relative;
      z-index: 2;
    }

    .b-sidebar {
      width: 260px;
      flex-shrink: 0;
      background: rgba(18, 24, 38, 0.95);
      backdrop-filter: blur(12px);
      border-right: 1px solid rgba(249,115,22,0.25);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .b-sidebar-logo {
      padding: 24px 20px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(249,115,22,0.25);
      flex-shrink: 0;
      text-decoration: none;
    }

    .b-sidebar-logo img {
      height: 40px;
      width: auto;
      display: block;
    }

    .b-logo-name {
      font-weight: 800;
      font-size: 1.1rem;
      background: linear-gradient(135deg, #f97316, #f43f5e, #06b6d4);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.02em;
    }

    .b-sidebar-section {
      padding: 24px 20px 8px;
      font-size: 0.7rem;
      font-weight: 700;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      flex-shrink: 0;
    }

    .b-sidebar-nav {
      flex: 1;
      overflow-y: auto;
      padding: 4px 12px 12px;
    }

    .b-sidebar-nav::-webkit-scrollbar {
      width: 3px;
    }

    .b-sidebar-nav::-webkit-scrollbar-thumb {
      background: rgba(249,115,22,0.4);
      border-radius: 99px;
    }

    .b-nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 11px 14px;
      border: none;
      border-radius: 12px;
      background: transparent;
      color: #cbd5e1;
      font-size: 0.88rem;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      text-align: left;
      text-decoration: none;
      transition: all 0.2s ease;
      margin-bottom: 4px;
    }

    .b-nav-item:hover {
      background: rgba(249,115,22,0.12);
      color: #f97316;
    }

    .b-nav-item.active {
      background: rgba(249,115,22,0.18);
      color: #f97316;
      font-weight: 700;
    }

    .b-nav-icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .b-sidebar-divider {
      height: 1px;
      background: rgba(249,115,22,0.2);
      margin: 12px 12px;
    }

    .logout-item {
      margin-top: auto;
      border-top: 1px solid rgba(249,115,22,0.2);
      margin-top: 16px;
      padding-top: 12px;
    }
    
    .logout-item .b-nav-item {
      color: #f87171;
    }
    
    .logout-item .b-nav-item:hover {
      background: rgba(248,113,113,0.12);
      color: #ff9f9f;
    }

    .b-sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid rgba(249,115,22,0.25);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .b-sf-info {
      min-width: 0;
    }
    
    .b-sf-name {
      font-weight: 700;
      font-size: 0.84rem;
      color: #ffffff;
    }
    
    .b-sf-sub {
      font-size: 0.73rem;
      color: #f97316;
      font-weight: 600;
    }

    .b-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      min-width: 0;
    }

    .b-main-header {
      padding: 14px 28px 12px;
      background: rgba(18, 24, 38, 0.85);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(249,115,22,0.2);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .b-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 28px 32px 40px;
    }

    .b-scroll::-webkit-scrollbar {
      width: 5px;
    }
    
    .b-scroll::-webkit-scrollbar-thumb {
      background: rgba(249,115,22,0.4);
      border-radius: 99px;
    }

    /* Back button */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      border: 1px solid rgba(249,115,22,0.5);
      color: #f97316;
      padding: 6px 20px;
      border-radius: 40px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }
    
    .back-btn:hover {
      background: rgba(249,115,22,0.12);
      border-color: #f97316;
      transform: translateX(-2px);
    }

    /* Listing Grid */
    .listing-detail-grid {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 28px;
    }

    /* Cards */
    .info-card {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(2px);
      border: 1px solid rgba(249,115,22,0.2);
      border-radius: 28px;
      margin-bottom: 24px;
      overflow: hidden;
    }

    .info-card h2 {
      font-size: 1rem;
      font-weight: 800;
      color: #ffffff;
      margin: 0;
      padding: 20px 24px 8px 24px;
      letter-spacing: -0.3px;
    }

    .info-card-content {
      padding: 8px 24px 24px 24px;
    }

    /* Gallery */
    .main-img {
      width: 100%;
      height: 340px;
      object-fit: cover;
      display: block;
      background: #1a1f2e;
    }

    .thumb-row {
      display: flex;
      gap: 10px;
      padding: 14px 20px;
      overflow-x: auto;
      background: rgba(0, 0, 0, 0.3);
    }
    
    .thumb {
      width: 80px;
      height: 60px;
      object-fit: cover;
      border-radius: 12px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: 0.2s;
      opacity: 0.7;
      background: #1a1f2e;
    }
    
    .thumb.active {
      border-color: #f97316;
      opacity: 1;
    }

    /* Badges */
    .cat-badge {
      background: rgba(249,115,22,0.18);
      color: #f97316;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 100px;
      border: 1px solid rgba(249,115,22,0.35);
      display: inline-block;
    }
    
    .avail-badge {
      background: rgba(6, 182, 212, 0.15);
      color: #2dd4bf;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 100px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    /* Seller */
    .seller-flex {
      display: flex;
      align-items: center;
      gap: 18px;
    }
    
    .seller-avatar {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #f97316, #f43f5e);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
      color: white;
    }

    /* Stars */
    .stars i {
      color: #fbbf24;
      font-size: 12px;
      margin-right: 2px;
    }
    .stars .far {
      color: #4b5563;
    }

    /* Chips */
    .chips-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }
    
    .chip {
      background: rgba(249,115,22,0.1);
      border: 1px solid rgba(249,115,22,0.3);
      padding: 5px 14px;
      border-radius: 30px;
      font-size: 12px;
      color: #fcd34d;
    }

    /* Reviews */
    .review-item {
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding: 16px 0;
    }
    .review-item:last-child {
      border-bottom: none;
    }
    
    .review-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    
    .reviewer-name {
      font-weight: 600;
      font-size: 14px;
      color: #e2e8f0;
    }
    
    .review-date {
      font-size: 11px;
      color: #6c7a91;
    }
    
    .review-comment {
      font-size: 13px;
      color: #cbd5e6;
      line-height: 1.5;
      margin-top: 6px;
    }

    /* Booking Card */
    .booking-card {
      background: rgba(18, 24, 38, 0.95);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(249,115,22,0.3);
      border-radius: 28px;
      padding: 28px 24px;
      position: sticky;
      top: 20px;
    }
    
    .price {
      font-size: 40px;
      font-weight: 800;
      background: linear-gradient(135deg, #f97316, #f43f5e);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    
    .divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
      margin: 18px 0;
    }
    
    .booking-input, .booking-textarea {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(249,115,22,0.3);
      border-radius: 14px;
      padding: 10px 14px;
      width: 100%;
      color: white;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
    }
    
    .booking-input:focus, .booking-textarea:focus {
      outline: none;
      border-color: #f97316;
    }
    
    label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #94a3b8;
      display: block;
      margin-bottom: 6px;
    }
    
    .btn-primary {
      background: linear-gradient(95deg, #f97316, #f43f5e);
      border: none;
      padding: 14px;
      width: 100%;
      border-radius: 40px;
      font-weight: 800;
      font-size: 15px;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      margin-bottom: 12px;
    }
    
    .btn-primary:hover {
      transform: scale(1.02);
      box-shadow: 0 0 15px rgba(249,115,22,0.4);
    }
    
    .btn-outline {
      background: transparent;
      border: 1px solid #f97316;
      padding: 12px;
      width: 100%;
      border-radius: 40px;
      font-weight: 600;
      color: #f97316;
      cursor: pointer;
      transition: 0.2s;
    }
    
    .btn-outline:hover {
      background: rgba(249,115,22,0.1);
    }

    /* Loader */
    .loading-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 400px;
    }
    
    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid rgba(249,115,22,0.2);
      border-top: 3px solid #f97316;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 860px) {
      .listing-detail-grid {
        grid-template-columns: 1fr;
      }
      .booking-card {
        position: relative;
        top: 0;
      }
      .b-sidebar {
        width: 72px;
      }
      .b-nav-item span:not(.b-nav-icon), .b-logo-name, .b-sidebar-section, .b-sf-info {
        display: none;
      }
      .b-sidebar-logo {
        justify-content: center;
      }
    }

    @media (max-width: 600px) {
      .b-scroll {
        padding: 16px;
      }
      .main-img {
        height: 220px;
      }
    }
  </style>
</head>
<body>
<div class="bg-animation">
  <div></div>
  <div></div>
  <div></div>
  <div></div>
</div>

<div class="b-shell">
  <aside class="b-sidebar">
    <a class="b-sidebar-logo" href="/">
      <img src="/assets/logo_2.svg" alt="CampusConnect">
      <span class="b-logo-name">CampusConnect</span>
    </a>
    <div class="b-sidebar-section">NAVIGATE</div>
    <nav class="b-sidebar-nav">
      <a class="b-nav-item" href="/pages/browse.html">
        <span class="b-nav-icon"><i class="fas fa-search"></i></span>
        <span>Browse</span>
      </a>
      <a class="b-nav-item" href="/pages/dashboard.html">
        <span class="b-nav-icon"><i class="fas fa-th-large"></i></span>
        <span>Dashboard</span>
      </a>
      <a class="b-nav-item" href="/pages/inbox.html">
        <span class="b-nav-icon"><i class="fas fa-envelope"></i></span>
        <span>Inbox</span>
      </a>
      <a class="b-nav-item" href="/pages/leaderboard.html">
        <span class="b-nav-icon"><i class="fas fa-trophy"></i></span>
        <span>Leaderboard</span>
      </a>
      <div class="b-sidebar-divider"></div>
      <a class="b-nav-item" href="/pages/listing-form.html">
        <span class="b-nav-icon"><i class="fas fa-plus-circle"></i></span>
        <span>List a service</span>
      </a>
      <div class="logout-item">
        <div class="b-sidebar-divider"></div>
        <a class="b-nav-item" id="logoutBtn" href="#">
          <span class="b-nav-icon"><i class="fas fa-sign-out-alt"></i></span>
          <span>Log out</span>
        </a>
      </div>
    </nav>
    <div class="b-sidebar-footer" id="sidebarFooter" style="display: none;">
      <div id="sidebarAvatarWrap"></div>
      <div class="b-sf-info">
        <div class="b-sf-name" id="sidebarName"></div>
        <div class="b-sf-sub" id="sidebarRank"></div>
      </div>
    </div>
  </aside>

  <main class="b-main">
    <div class="b-main-header">
      <a href="/pages/browse.html" class="back-btn">
        <i class="fas fa-arrow-left"></i> Back to browse
      </a>
    </div>
    <div class="b-scroll">
      <div id="listingContent"></div>
      
      <template id="listingTemplate">
        <div class="listing-detail-grid">
          <div>
            <div style="margin-bottom:20px">
              <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px">
                <span id="listingCatBadge" class="cat-badge"></span>
                <span id="listingAvailBadge" class="avail-badge"><i class="fas fa-clock"></i> <span></span></span>
              </div>
              <h1 id="listingTitle" style="font-size:1.8rem;font-weight:900;margin:0 0 12px;letter-spacing:-.02em;"></h1>
              <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
                <div id="listingHeaderRating" class="stars"></div>
                <div id="listingHeaderMeta" style="color:#94a3b8;font-size:14px"></div>
              </div>
            </div>

            <div class="info-card" style="padding:0;margin-bottom:24px">
              <img id="mainImg" class="main-img" src="" alt="">
              <div id="thumbs" class="thumb-row"></div>
            </div>

            <div class="info-card">
              <h2>About this service</h2>
              <div class="info-card-content">
                <p id="listingDesc" style="color:#cbd5e6;line-height:1.7;font-size:14px;margin-bottom:18px"></p>
                <div id="serviceChips" class="chips-wrap"></div>
              </div>
            </div>

            <div class="info-card">
              <h2>About the seller</h2>
              <div class="info-card-content">
                <div id="sellerCardContent" class="seller-flex"></div>
                <p id="sellerBio" style="margin-top:18px;font-size:13px;color:#9ca3af"></p>
              </div>
            </div>

            <div class="info-card">
              <h2>Reviews</h2>
              <div class="info-card-content" id="reviewsList"></div>
            </div>
          </div>

          <div>
            <div class="booking-card">
              <div id="bookingPrice" class="price"></div>
              <div id="bookingPriceType" style="font-size:14px;color:#94a3b8;margin-top:4px"></div>
              <div class="divider"></div>
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:18px">
                <span id="bookingStars" class="stars"></span>
                <span id="bookingRatingText" style="font-size:13px;color:#cbd5e6"></span>
              </div>
              <div id="bookingSeller" style="display:flex;align-items:center;gap:12px;margin-bottom:18px"></div>
              <div class="divider"></div>
              
              <label>Notes / requirements</label>
              <textarea id="bookingNotes" class="booking-textarea" rows="3" placeholder="Describe what you need..."></textarea>
              
              <label style="margin-top:14px">Scheduled for (optional)</label>
              <input type="datetime-local" id="bookingDate" class="booking-input">
              
              <button id="bookBtn" class="btn-primary">Book this service</button>
              <button id="msgBtn" class="btn-outline">Message seller</button>
              
              <p style="font-size:11px;text-align:center;margin-top:16px;color:#6c7a91">
                🔒 You won't be charged until the seller confirms your booking.
              </p>
            </div>
          </div>
        </div>
      </template>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/config.js"></script>
<script>window.sbClient = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON);</script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/common.js"></script>
<script src="/js/listing.js"></script>
</body>
</html>
