<!doctype html>
<html lang="en">
<head>
  <script>(function(){if(localStorage.getItem("cc_theme")==="dark")document.documentElement.setAttribute("data-theme","dark");}());</script>
  <link rel="stylesheet" href="../css/dark.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="../assets/campus_logo.svg" type="image/svg+xml">
  <title>Create listing — CampusConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="listing-form.css">
</head>
<body>
<div class="lf-shell">

  <!-- ── Nav sidebar ──────────────────────────────── -->
  <aside class="b-sidebar">
    <a class="b-sidebar-logo" href="/">
      <img src="../assets/logo_2.svg" alt="CampusConnect">
      <span class="b-logo-name">CampusConnect</span>
    </a>
    <div class="b-sidebar-section">Navigate</div>
    <nav class="b-sidebar-nav">
      <a class="b-nav-item" href="/pages/browse.html">
        <span class="b-nav-icon"><svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/></svg></span>
        Browse
      </a>
      <a class="b-nav-item" href="/pages/dashboard.html">
        <span class="b-nav-icon"><svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path d="M3 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h6a1 1 0 110 2H4a1 1 0 01-1-1z"/></svg></span>
        Dashboard
      </a>
      <a class="b-nav-item" href="/pages/inbox.html">
        <span class="b-nav-icon"><svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/><path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/></svg></span>
        Inbox
      </a>
      <a class="b-nav-item" href="/pages/leaderboard.html">
        <span class="b-nav-icon"><svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg></span>
        Leaderboard
      </a>
      <div class="b-sidebar-divider"></div>
      <a class="b-nav-item active" href="/pages/listing-form.html">
        <span class="b-nav-icon"><svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/></svg></span>
        List a service
      </a>
    </nav>
    <div class="b-sidebar-footer" id="sidebarFooter" style="display:none">
      <div id="sidebarAvatarWrap"></div>
      <div class="b-sf-info">
        <div class="b-sf-name" id="sidebarName"></div>
        <div class="b-sf-sub"  id="sidebarRank"></div>
      </div>
    </div>
  </aside>

  <!-- ── Main ──────────────────────────────────────── -->
  <div class="lf-main">
    <div class="lf-header">
      <div>
        <div class="lf-eyebrow">Seller tools</div>
        <h1 id="formHeading">Create a listing</h1>
        <p>Showcase your skills and start earning on campus.</p>
      </div>
      <a class="lf-back" href="/pages/dashboard.html">
        <svg viewBox="0 0 20 20" fill="currentColor" width="14" height="14"><path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd"/></svg>
        Dashboard
      </a>
    </div>

    <div class="lf-scroll">
      <div class="lf-card">
        <div id="formMsg" class="form-msg" style="display:none;margin-bottom:18px"></div>

        <form id="listingForm" enctype="multipart/form-data">
          <div class="form-rows">
            <div class="form-group">
              <label class="form-label" for="title">Title *</label>
              <input type="text" id="title" name="title" placeholder="e.g. Calculus &amp; Stats Tutoring" required maxlength="100">
            </div>
            <div class="form-group">
              <label class="form-label" for="description">Description *</label>
              <textarea id="description" name="description" rows="5" placeholder="Describe your service, what's included, turnaround time..." required></textarea>
            </div>
            <div class="form-grid-2">
              <div class="form-group">
                <label class="form-label" for="category">Category *</label>
                <select id="category" name="category" required>
                  <option value="">Select category</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label" for="price">Price (ZAR)</label>
                <input type="number" id="price" name="price" placeholder="Leave blank for 'Quote'" min="0" step="0.01">
              </div>
            </div>
            <div class="form-grid-2">
              <div class="form-group">
                <label class="form-label" for="price_type">Price type *</label>
                <select id="price_type" name="price_type" required>
                  <option value="fixed">Fixed price</option>
                  <option value="hourly">Per hour</option>
                  <option value="per_session">Per session</option>
                  <option value="quote">Custom quote</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label" for="delivery_method">Delivery method *</label>
                <select id="delivery_method" name="delivery_method" required>
                  <option value="online">Online</option>
                  <option value="in-person">In-person</option>
                  <option value="both">Both</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" for="turnaround_time">Turnaround time *</label>
              <input type="text" id="turnaround_time" name="turnaround_time" placeholder="e.g. 1-2 days, 3 hours, 1 week" required>
            </div>
            <div class="form-group">
              <label class="form-label">Portfolio images (up to 3)</label>
              <div class="img-previews" id="imagePreviews">
                <label class="img-upload-btn" id="imgUploadBtn">
                  <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                  <span>Add photo</span>
                  <input type="file" id="imageInput" accept="image/*" multiple style="display:none">
                </label>
              </div>
            </div>
            <div class="toggle-wrap">
              <input type="checkbox" class="toggle-input" id="isAvailable" name="is_available" checked>
              <label class="toggle-label" for="isAvailable">
                <span class="toggle-track"></span>
                Available for bookings
              </label>
            </div>
            <button type="submit" class="btn btn-primary btn-lg" id="submitBtn">Publish listing</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/config.js"></script>
<script>window.sbClient = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON);</script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/common.js"></script>
<script src="/js/listing-form.js"></script>
</body>
</html>
