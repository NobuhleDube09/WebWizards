<!doctype html>
<html lang="en">
<head>
  <script>(function(){if(localStorage.getItem("cc_theme")==="dark")document.documentElement.setAttribute("data-theme","dark");}());</script>
  <link rel="stylesheet" href="/css/dark.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/assets/campus_logo.svg" type="image/svg+xml">
  <title>Create listing &mdash; CampusConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --primary:    #00C97F;
      --primary-d:  #00a868;
      --primary-bg: #e6fff4;
      --text:       #111827;
      --text-2:     #4b5563;
      --text-3:     #9ca3af;
      --border:     #e5e7eb;
      --bg:         #f3f5f4;
      --sidebar-w:  250px;
      --brand:         #00C97F;
      --brand-dim:     rgba(0,201,127,0.1);
      --text-primary:  #111827;
      --text-secondary:#4b5563;
      --text-muted:    #9ca3af;
      --bg-card:       #ffffff;
      --radius-full:   999px;
      --transition:    all 0.2s cubic-bezier(0.4,0,0.2,1);
      --red:           #ef4444;
    }

    html, body { height:100%; font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; }

    .lf-shell { display:flex; height:100vh; overflow:hidden; }

    /* ── Sidebar ─────────────────────────────────── */
    .b-sidebar {
      width: var(--sidebar-w); flex-shrink: 0;
      background: #fff; border-right: 1px solid var(--border);
      display: flex; flex-direction: column; height: 100vh; overflow: hidden;
    }
    .b-sidebar-logo {
      padding: 20px 20px 18px; display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid var(--border); flex-shrink: 0; text-decoration: none;
    }
    .b-sidebar-logo img { height:40px; width:auto; display:block; flex-shrink:0; }
    .b-logo-name { font-weight:800; font-size:1rem; color:var(--text); letter-spacing:-.02em; white-space:nowrap; }
    .b-sidebar-section { padding:20px 20px 8px; font-size:.68rem; font-weight:700; color:var(--text-3); text-transform:uppercase; letter-spacing:.08em; flex-shrink:0; }
    .b-sidebar-nav { flex:1; overflow-y:auto; padding:4px 12px 12px; }
    .b-nav-item {
      display: flex; align-items: center; gap: 12px; width: 100%; padding: 11px 14px;
      border: none; border-radius: 10px; background: transparent; color: var(--text-2);
      font-size: .88rem; font-weight: 500; font-family: 'Inter',sans-serif;
      cursor: pointer; text-align: left; text-decoration: none;
      transition: background .15s, color .15s; margin-bottom: 3px;
    }
    .b-nav-item:hover { background:#f3f5f4; color:var(--text); }
    .b-nav-item.active { background:var(--primary-bg); color:var(--primary-d); font-weight:700; }
    .b-nav-item.active .b-nav-icon { color:var(--primary); }
    .b-nav-icon { width:18px; height:18px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .b-sidebar-divider { height:1px; background:var(--border); margin:8px 12px; }
    .b-sidebar-footer {
      padding: 16px 20px; border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px; flex-shrink: 0;
    }
    .b-sf-info { min-width:0; }
    .b-sf-name { font-weight:700; font-size:.84rem; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .b-sf-sub  { font-size:.73rem; color:var(--primary-d); font-weight:600; }

    /* ── Main ────────────────────────────────────── */
    .lf-main {
      flex: 1; display: flex; flex-direction: column;
      height: 100vh; overflow: hidden; min-width: 0;
    }
    .lf-header {
      padding: 16px 28px 14px; background: #fff;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
      display: flex; align-items: flex-end; justify-content: space-between; gap: 16px;
    }
    .lf-eyebrow { font-size:.68rem; font-weight:700; color:var(--text-3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:3px; }
    .lf-header h1 { font-size:1.35rem; font-weight:800; color:var(--text); letter-spacing:-.03em; }
    .lf-header p  { font-size:.84rem; color:var(--text-2); margin-top:3px; }
    .lf-scroll { flex:1; overflow-y:auto; padding:28px; }
    .lf-scroll::-webkit-scrollbar { width:4px; }
    .lf-scroll::-webkit-scrollbar-thumb { background:var(--border); border-radius:99px; }

    /* ── Back link ───────────────────────────────── */
    .lf-back {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: .82rem; font-weight: 600; color: var(--text-2);
      text-decoration: none; padding: 7px 14px; border-radius: 9px;
      border: 1.5px solid var(--border); background: #fff;
      transition: border-color .15s, color .15s; white-space: nowrap;
    }
    .lf-back:hover { border-color: var(--primary); color: var(--primary-d); }

    /* ── Form card ───────────────────────────────── */
    .lf-card {
      background: #fff; border: 1px solid var(--border); border-radius: 16px;
      padding: 28px;
      box-shadow: 0 1px 4px rgba(0,0,0,.04);
    }

    /* ── Form elements ───────────────────────────── */
    .form-group { display:flex; flex-direction:column; gap:6px; }
    .form-label { font-size:.78rem; font-weight:700; color:var(--text-2); text-transform:uppercase; letter-spacing:.04em; }
    .form-grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .form-rows { display:flex; flex-direction:column; gap:18px; }

    input[type=text], input[type=number], textarea, select {
      width: 100%; padding: 10px 13px;
      border: 1.5px solid var(--border); border-radius: 10px;
      background: var(--bg); font-size: .88rem; font-family: 'Inter',sans-serif;
      color: var(--text); outline: none; transition: border-color .15s;
    }
    input:focus, textarea:focus, select:focus { border-color:var(--primary); background:#fff; }
    input::placeholder, textarea::placeholder { color:var(--text-3); }
    textarea { resize:vertical; min-height:130px; }
    select { cursor:pointer; }

    /* ── Image upload ────────────────────────────── */
    .img-previews { display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
    .img-upload-btn {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 6px; width: 80px; height: 80px; border-radius: 10px;
      border: 2px dashed var(--border); background: var(--bg);
      color: var(--text-3); font-size: .72rem; font-weight: 600;
      cursor: pointer; transition: border-color .15s, color .15s;
    }
    .img-upload-btn:hover { border-color:var(--primary); color:var(--primary-d); }

    /* ── Toggle ──────────────────────────────────── */
    .toggle-wrap { display:flex; align-items:center; }
    .toggle-input { display:none; }
    .toggle-label { display:flex; align-items:center; gap:10px; cursor:pointer; font-size:.88rem; font-weight:500; color:var(--text-2); }
    .toggle-track {
      width:42px; height:24px; border-radius:999px; background:var(--border);
      position:relative; transition:background .2s; flex-shrink:0;
    }
    .toggle-track::after {
      content:''; position:absolute; top:3px; left:3px;
      width:18px; height:18px; border-radius:50%; background:#fff;
      transition:transform .2s; box-shadow:0 1px 3px rgba(0,0,0,.2);
    }
    .toggle-input:checked + .toggle-label .toggle-track { background:var(--primary); }
    .toggle-input:checked + .toggle-label .toggle-track::after { transform:translateX(18px); }

    /* ── Form message ────────────────────────────── */
    .form-msg { padding:12px 16px; border-radius:10px; font-size:.86rem; font-weight:500; }
    .form-msg.success { background:var(--primary-bg); color:var(--primary-d); }
    .form-msg.error   { background:#fff1f2; color:#dc2626; }

    /* ── Submit button ───────────────────────────── */
    .btn-submit {
      width: 100%; padding: 13px; border-radius: 11px;
      background: var(--primary); color: #fff; border: none;
      font-size: .95rem; font-weight: 700; font-family: 'Inter',sans-serif;
      cursor: pointer; transition: background .15s, transform .1s;
      box-shadow: 0 2px 8px rgba(0,201,127,.3);
    }
    .btn-submit:hover { background:var(--primary-d); transform:translateY(-1px); }
    .btn-submit:disabled { opacity:.6; cursor:not-allowed; transform:none; }
    .btn-submit.loading::after { content:' …'; }

    /* ── Shared helpers ──────────────────────────── */
    .avatar { border-radius:50%; object-fit:cover; flex-shrink:0; display:block; }
    .avatar-xs  { width:28px; height:28px; }
    .avatar-sm  { width:40px; height:40px; }
    .avatar-init { background:var(--primary-bg); color:var(--primary-d); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:.75rem; font-family:'Inter',sans-serif; }

    #toast-container { position:fixed; bottom:20px; right:20px; z-index:9999; display:flex; flex-direction:column; gap:8px; }
    .toast { background:#1f2937; color:#fff; padding:11px 18px; border-radius:10px; font-size:.84rem; font-weight:500; font-family:'Inter',sans-serif; animation:toastIn .25s ease forwards; box-shadow:0 4px 16px rgba(0,0,0,.18); }
    .toast.out { animation:toastOut .3s ease forwards; }
    @keyframes toastIn  { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
    @keyframes toastOut { from{opacity:1} to{opacity:0;transform:translateY(6px)} }

    /* legacy class aliases used by listing-form.js */
    .btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:9px; font-size:.83rem; font-weight:600; font-family:'Inter',sans-serif; cursor:pointer; text-decoration:none; border:none; transition:background .15s; }
    .btn-primary { background:var(--primary); color:#fff; }
    .btn-primary:hover { background:var(--primary-d); }
    .btn-lg { padding:13px 24px; font-size:.95rem; width:100%; justify-content:center; box-shadow:0 2px 8px rgba(0,201,127,.3); }
    .btn-lg:hover { transform:translateY(-1px); }
    .btn:disabled { opacity:.6; cursor:not-allowed; transform:none; }
    .loading::after { content:' …'; }

    @media (max-width:768px) { .b-sidebar { display:none; } .lf-scroll { padding:16px; } .form-grid-2 { grid-template-columns:1fr; } }
  </style>
</head>
<body>
<div class="lf-shell">

  <!-- ── Nav sidebar ──────────────────────────────── -->
  <aside class="b-sidebar">
    <a class="b-sidebar-logo" href="/">
      <img src="../assets/logo_2.svg" alt="CampusConnect">
      <span class="b-logo-name">CampusConnect</span>
    </a>
    <div class="b-sidebar-section">Navigate</div>
    <nav class="b-sidebar-nav">
      <a class="b-nav-item" href="/pages/browse.html">
        <span class="b-nav-icon"><svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/></svg></span>
        Browse
      </a>
      <a class="b-nav-item" href="/pages/dashboard.html">
        <span class="b-nav-icon"><svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path d="M3 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h6a1 1 0 110 2H4a1 1 0 01-1-1z"/></svg></span>
        Dashboard
      </a>
      <a class="b-nav-item" href="/pages/inbox.html">
        <span class="b-nav-icon"><svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/><path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/></svg></span>
        Inbox
      </a>
      <a class="b-nav-item" href="/pages/leaderboard.html">
        <span class="b-nav-icon"><svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg></span>
        Leaderboard
      </a>
      <div class="b-sidebar-divider"></div>
      <a class="b-nav-item active" href="/pages/listing-form.html">
        <span class="b-nav-icon"><svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/></svg></span>
        List a service
      </a>
    </nav>
    <div class="b-sidebar-footer" id="sidebarFooter" style="display:none">
      <div id="sidebarAvatarWrap"></div>
      <div class="b-sf-info">
        <div class="b-sf-name" id="sidebarName"></div>
        <div class="b-sf-sub"  id="sidebarRank"></div>
      </div>
    </div>
  </aside>

  <!-- ── Main ──────────────────────────────────────── -->
  <div class="lf-main">
    <div class="lf-header">
      <div>
        <div class="lf-eyebrow">Seller tools</div>
        <h1 id="formHeading">Create a listing</h1>
        <p>Showcase your skills and start earning on campus.</p>
      </div>
      <a class="lf-back" href="/pages/dashboard.html">
        <svg viewBox="0 0 20 20" fill="currentColor" width="14" height="14"><path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd"/></svg>
        Dashboard
      </a>
    </div>

    <div class="lf-scroll">
      <div class="lf-card">
        <div id="formMsg" class="form-msg" style="display:none;margin-bottom:18px"></div>

        <form id="listingForm" enctype="multipart/form-data">
          <div class="form-rows">
            <div class="form-group">
              <label class="form-label" for="title">Title *</label>
              <input type="text" id="title" name="title" placeholder="e.g. Calculus &amp; Stats Tutoring" required maxlength="100">
            </div>
            <div class="form-group">
              <label class="form-label" for="description">Description *</label>
              <textarea id="description" name="description" rows="5" placeholder="Describe your service, what's included, turnaround time..." required></textarea>
            </div>
            <div class="form-grid-2">
              <div class="form-group">
                <label class="form-label" for="category">Category *</label>
                <select id="category" name="category" required>
                  <option value="">Select category</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label" for="price">Price (ZAR)</label>
                <input type="number" id="price" name="price" placeholder="Leave blank for 'Quote'" min="0" step="0.01">
              </div>
            </div>
            <div class="form-grid-2">
              <div class="form-group">
                <label class="form-label" for="price_type">Price type *</label>
                <select id="price_type" name="price_type" required>
                  <option value="fixed">Fixed price</option>
                  <option value="hourly">Per hour</option>
                  <option value="per_session">Per session</option>
                  <option value="quote">Custom quote</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label" for="delivery_method">Delivery method *</label>
                <select id="delivery_method" name="delivery_method" required>
                  <option value="online">Online</option>
                  <option value="in-person">In-person</option>
                  <option value="both">Both</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" for="turnaround_time">Turnaround time *</label>
              <input type="text" id="turnaround_time" name="turnaround_time" placeholder="e.g. 1-2 days, 3 hours, 1 week" required>
            </div>
            <div class="form-group">
              <label class="form-label">Portfolio images (up to 3)</label>
              <div class="img-previews" id="imagePreviews">
                <label class="img-upload-btn" id="imgUploadBtn">
                  <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                  <span>Add photo</span>
                  <input type="file" id="imageInput" accept="image/*" multiple style="display:none">
                </label>
              </div>
            </div>
            <div class="toggle-wrap">
              <input type="checkbox" class="toggle-input" id="isAvailable" name="is_available" checked>
              <label class="toggle-label" for="isAvailable">
                <span class="toggle-track"></span>
                Available for bookings
              </label>
            </div>
            <button type="submit" class="btn btn-primary btn-lg" id="submitBtn">Publish listing</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/config.js"></script>
<script>window.sbClient = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON);</script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/common.js"></script>
<script src="/js/listing-form.js"></script>
</body>
</html>
