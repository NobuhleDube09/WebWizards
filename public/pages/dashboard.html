<!doctype html>
<html lang="en">
<head>
  <script>(function(){if(localStorage.getItem("cc_theme")==="dark")document.documentElement.setAttribute("data-theme","dark");}());</script>
  <link rel="stylesheet" href="/css/dark.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="icon" href="/assets/campus_logo.svg" type="image/svg+xml">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Dashboard � CampusConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
<div class="d-shell">

  <!-- -- LEFT SIDEBAR ------------------------------------ -->
  <aside class="d-sidebar">
    <div class="d-sidebar-logo">
      <img src="../assets/logo_2.svg" class="sidebar-logo" alt="CampusConnect">
      <span class="logo-name">CampusConnect</span>
    </div>

    <div class="d-sidebar-section-label">Menu</div>

    <nav class="d-sidebar-nav">
      <a class="dash-nav-item" href="/pages/browse.html">
        <span class="dash-nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
        <span>Browse</span>
      </a>
      <button class="dash-nav-item active" data-tab="overview">
        <span class="dash-nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></span>
        <span>Overview</span>
      </button>
      <button class="dash-nav-item" data-tab="listings">
        <span class="dash-nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></span>
        <span>My listings</span>
      </button>
      <button class="dash-nav-item" data-tab="orders">
        <span class="dash-nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg></span>
        <span>Orders</span>
      </button>
      <button class="dash-nav-item" data-tab="bookings">
        <span class="dash-nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
        <span>Bookings</span>
      </button>
      <button class="dash-nav-item" data-tab="reviews">
        <span class="dash-nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></span>
        <span>Reviews</span>
      </button>
      <div class="d-sidebar-divider"></div>
      <a class="dash-nav-item" href="/pages/admin.html" id="adminNavLink" style="display:none;color:#ef4444">
        <span class="dash-nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></span>
        <span>Admin Panel</span>
        <span style="margin-left:auto;font-size:.65rem;font-weight:700;background:#ef4444;color:#fff;padding:1px 6px;border-radius:99px">ADMIN</span>
      </a>
      <button class="dash-nav-item" data-tab="reports">
        <span class="dash-nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg></span>
        <span>Reports</span>
      </button>
      <button class="dash-nav-item" data-tab="settings">
        <span class="dash-nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span>
        <span>Settings</span>
      </button>
      <button class="dash-nav-item" id="logoutBtn">
        <span class="dash-nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></span>
        <span>Log out</span>
      </button>
    </nav>

    <div class="d-sidebar-footer" id="sidebarProfile">
      <div id="sidebarAvatarWrap"></div>
      <div class="sf-info">
        <div class="sf-name" id="sidebarName">�</div>
        <div class="sf-rank" id="sidebarRank"></div>
      </div>
    </div>
  </aside>

  <!-- -- MAIN CONTENT ------------------------------------- -->
  <main class="d-main">
    <!-- Header -->
    <div class="d-main-header">
      <div class="header-title-wrap">
        <div class="header-greeting" id="dashGreeting">GOOD MORNING</div>
        <h1 id="dashWelcomeName">Welcome back!</h1>
      </div>
      <div class="d-header-actions">
        <a href="/pages/listing-form.html" class="d-btn primary">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New listing
        </a>
      </div>
    </div>

    <!-- Scrollable tab area -->
    <div class="d-tab-body">

      <!-- -- OVERVIEW ------------------------------- -->
      <section id="tab-overview" class="dashboard-tab active-tab">

        <!-- Profile card + 4 stat cards -->
        <div class="d-overview-top">
          <div class="d-profile-card">
            <div class="pc-avatar" id="profileAvatarWrap"></div>
            <div class="pc-name" id="profileName">�</div>
            <span class="pc-rank" id="profileRank">�</span>
            <div class="pc-meta" id="profileMeta"></div>
            <div class="pc-stats">
              <div class="pc-stat">
                <span class="pc-stat-val" id="pcListings">0</span>
                <span class="pc-stat-lbl">Listings</span>
              </div>
              <div class="pc-stat">
                <span class="pc-stat-val" id="pcRating">�</span>
                <span class="pc-stat-lbl">Rating</span>
              </div>
              <div class="pc-stat">
                <span class="pc-stat-val" id="pcXp">0</span>
                <span class="pc-stat-lbl">XP</span>
              </div>
            </div>
          </div>

          <div class="d-stats-grid" id="statsGrid">
            <div class="loading-wrap" style="grid-column:span 2"><div class="spinner"></div></div>
          </div>
        </div>

        <!-- 3 Summary cards -->
        <div class="d-summary-row" id="summaryRow">
          <!-- populated by JS -->
        </div>

        <!-- Recent orders -->
        <div id="recentActivity"></div>

      </section>

      <!-- -- MY LISTINGS ---------------------------- -->
      <section id="tab-listings" class="dashboard-tab">
        <div class="section-header mb-3">
          <div class="d-tab-title">My listings</div>
          <a class="d-btn primary" href="/pages/listing-form.html">+ New listing</a>
        </div>
        <div id="myListings" class="listings-grid"></div>
      </section>

      <!-- -- ORDERS --------------------------------- -->
      <section id="tab-orders" class="dashboard-tab">
        <div class="d-tab-title">Orders</div>
        <div class="tab-pills mb-3" id="orderTabs">
          <button class="tab-pill active" data-status="all">All</button>
          <button class="tab-pill" data-status="pending">Pending</button>
          <button class="tab-pill" data-status="accepted">Accepted</button>
          <button class="tab-pill" data-status="completed">Completed</button>
        </div>
        <div id="ordersList"></div>
      </section>

      <!-- -- BOOKINGS -------------------------------- -->
      <section id="tab-bookings" class="dashboard-tab">
        <div class="d-tab-title">My bookings</div>
        <div class="tab-pills mb-3" id="bookingTabs">
          <button class="tab-pill active" data-bstatus="all">All</button>
          <button class="tab-pill" data-bstatus="pending">Pending</button>
          <button class="tab-pill" data-bstatus="accepted">Accepted</button>
          <button class="tab-pill" data-bstatus="completed">Completed</button>
        </div>
        <div id="bookingsList"></div>
      </section>

      <!-- -- REVIEWS --------------------------------- -->
      <section id="tab-reviews" class="dashboard-tab">
        <div class="tab-pills mb-3" id="reviewViewTabs">
          <button class="tab-pill active" data-rview="received">Reviews received</button>
          <button class="tab-pill" data-rview="written">Reviews I wrote</button>
        </div>
        <div id="reviewsList"></div>
        <div id="reviewsWrittenList" style="display:none"></div>
      </section>

      <!-- -- REPORTS --------------------------------- -->
      <section id="tab-reports" class="dashboard-tab">
        <div class="d-tab-title" style="margin-bottom:6px">Reports &amp; Exports</div>
        <p style="font-size:.85rem;color:#6b7280;margin-bottom:22px">Download your data as a PDF or CSV file.</p>
        <div id="reportsGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px"></div>
      </section>

      <!-- -- SETTINGS -------------------------------- -->
      <section id="tab-settings" class="dashboard-tab">
        <div class="d-tab-title">Account settings</div>
        <div class="card card-pad" style="max-width:560px">
          <form id="settingsForm" class="form-grid">
            <div class="form-group">
              <label class="form-label">Avatar</label>
              <div class="flex items-center gap-2" style="align-items:center">
                <div id="avatarPreview"></div>
                <label class="btn btn-ghost btn-sm" style="cursor:pointer;margin-left:8px">
                  Change photo
                  <input type="file" id="avatarInput" accept="image/jpeg,image/png,image/webp,image/gif" style="display:none">
                </label>
              </div>
            </div>
            <div class="form-grid-2">
              <div class="form-group">
                <label class="form-label" for="settingsName">Display name</label>
                <input type="text" id="settingsName" name="name">
              </div>
              <div class="form-group">
                <label class="form-label" for="settingsUni">University / Faculty</label>
                <input type="text" id="settingsUni" name="university">
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" for="settingsYear">Year of study</label>
              <select id="settingsYear" name="year_of_study">
                <option value="">Select year</option>
                <option value="1">1st year</option>
                <option value="2">2nd year</option>
                <option value="3">3rd year</option>
                <option value="4">4th year</option>
                <option value="5">5th year</option>
                <option value="6">Postgrad</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="settingsBio">Bio</label>
              <textarea id="settingsBio" name="bio" rows="3" placeholder="Tell buyers about yourself..."></textarea>
            </div>
            <div class="form-group">
              <label class="form-label" for="settingsSkills">Skills (comma-separated)</label>
              <input type="text" id="settingsSkills" name="skills" placeholder="e.g. Maths, Python, Photography">
            </div>
            <button type="submit" class="btn btn-primary" id="saveSettingsBtn" style="width:fit-content">Save changes</button>
          </form>
        </div>
      </section>

    </div><!-- /d-tab-body -->
  </main>

    <!-- -- RIGHT PANEL: Messages --------------------------------- -->
  <aside class="d-right">
    <div class="d-right-header">
      <h3>Messages</h3>
      <a href="/pages/inbox.html" class="d-right-refresh" title="Open full inbox" style="text-decoration:none">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      </a>
    </div>
    <!-- Conversation list -->
    <div id="dmConvList" class="dm-conv-list">
      <div class="loading-wrap"><div class="spinner"></div></div>
    </div>
    <!-- Thread view (shown when a conversation is open) -->
    <div id="dmThread" class="dm-thread" style="display:none"></div>
  </aside>

</div><!-- /d-shell -->

<!-- ── Review Modal ──────────────────────────────────────────────────── -->
<div id="reviewModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9000;align-items:center;justify-content:center;padding:1rem">
  <div style="background:#fff;border-radius:20px;padding:28px 28px 24px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.2);position:relative">
    <button id="reviewModalClose" style="position:absolute;top:14px;right:14px;background:none;border:none;cursor:pointer;color:var(--text-3);font-size:1.2rem;line-height:1;padding:4px">&times;</button>
    <h3 style="font-size:1.05rem;font-weight:800;color:#111827;margin-bottom:4px">Leave a review</h3>
    <p id="reviewModalSub" style="font-size:.8rem;color:var(--text-3);margin-bottom:20px"></p>
    <div style="margin-bottom:16px">
      <div style="font-size:.78rem;font-weight:600;color:var(--text-2);margin-bottom:8px">Your rating</div>
      <div id="starPicker" style="display:flex;gap:6px;font-size:1.8rem;cursor:pointer">
        <span data-star="1">&#9733;</span>
        <span data-star="2">&#9733;</span>
        <span data-star="3">&#9733;</span>
        <span data-star="4">&#9733;</span>
        <span data-star="5">&#9733;</span>
      </div>
    </div>
    <div class="form-group" style="margin-bottom:18px">
      <label class="form-label">Review</label>
      <textarea id="reviewContent" rows="3" placeholder="Share your experience with this seller..." style="resize:vertical"></textarea>
    </div>
    <button id="reviewSubmitBtn" class="btn btn-primary w-full" style="width:100%;padding:11px;font-size:.88rem">Submit review</button>
  </div>
</div>

<div id="toast-container"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/config.js"></script>
<script>window.sbClient = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON);</script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/common.js"></script>
<script src="../js/dashboard.js"></script>
</body>
</html>
