<!doctype html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <meta name="mobile-web-app-capable" content="yes">

  <title>Dashboard � CampusConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
*,
*::before,
*::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --primary: #f97316;
  --primary-d: #ea580c;
  --primary-bg: rgba(249, 115, 22, 0.12);
  --gold: #f59e0b;
  --gold-bg: rgba(245, 158, 11, 0.12);
  --coral: #f43f5e;
  --coral-bg: rgba(244, 63, 94, 0.12);
  --purple: #a855f7;
  --purple-bg: rgba(168, 85, 247, 0.12);
  --teal: #06b6d4;
  --text: #ffffff;
  --text-2: #cbd5e1;
  --text-3: #94a3b8;
  --border: rgba(255, 255, 255, 0.12);
  --bg: #0f1724;
  --sidebar-w: 250px;
  --right-w: 270px;
}

html,
body {
  height: 100%;
  overflow: hidden;
  font-family: "Inter", sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* Animated Background */
.bg-animation {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  z-index: 0;
  pointer-events: none;
}

.bg-animation div {
  position: absolute;
  border-radius: 50%;
  animation: float 28s infinite ease-in-out;
  filter: blur(60px);
  opacity: 0.5;
}

.bg-animation div:nth-child(1) {
  top: 10%;
  left: -5%;
  width: 550px;
  height: 550px;
  animation-delay: 0s;
  background: radial-gradient(circle, rgba(249, 115, 22, 0.35), rgba(236, 72, 153, 0.1));
}

.bg-animation div:nth-child(2) {
  bottom: 10%;
  right: -5%;
  width: 600px;
  height: 600px;
  animation-delay: -8s;
  background: radial-gradient(circle, rgba(236, 72, 153, 0.3), rgba(6, 182, 212, 0.05));
}

.bg-animation div:nth-child(3) {
  top: 40%;
  right: 20%;
  width: 400px;
  height: 400px;
  animation-delay: -15s;
  background: radial-gradient(circle, rgba(6, 182, 212, 0.28), rgba(249, 115, 22, 0.05));
}

.bg-animation div:nth-child(4) {
  bottom: 30%;
  left: 15%;
  width: 480px;
  height: 480px;
  animation-delay: -22s;
  background: radial-gradient(circle, rgba(168, 85, 247, 0.2), rgba(249, 115, 22, 0.05));
}

@keyframes float {
  0%,
  100% {
    transform: translate(0, 0) scale(1);
  }
  33% {
    transform: translate(40px, -40px) scale(1.08);
  }
  66% {
    transform: translate(-30px, 30px) scale(0.96);
  }
}

/* -- 3-Column Shell -------------------------------- */
.d-shell {
  display: flex;
  height: 100vh;
  overflow: hidden;
  position: relative;
  z-index: 2;
}

/* -- Sidebar --------------------------------------- */
.d-sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  background: rgba(15, 23, 34, 0.7);
  backdrop-filter: blur(12px);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

.d-sidebar-logo {
  padding: 20px 20px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.sidebar-logo {
  height: 40px;
  width: auto;
  display: block;
  flex-shrink: 0;
}

.logo-name {
  font-weight: 800;
  font-size: 1rem;
  background: linear-gradient(135deg, #f97316, #f43f5e);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  letter-spacing: -0.02em;
  white-space: nowrap;
}

.d-sidebar-section-label {
  padding: 20px 20px 8px;
  font-size: 0.68rem;
  font-weight: 700;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  flex-shrink: 0;
}

.d-sidebar-nav {
  flex: 1;
  overflow-y: auto;
  padding: 4px 12px 12px;
}

.d-sidebar-nav::-webkit-scrollbar {
  width: 3px;
}

.d-sidebar-nav::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 99px;
}

.dash-nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  padding: 11px 14px;
  border: none;
  border-radius: 10px;
  background: transparent;
  color: var(--text-2);
  font-size: 0.88rem;
  font-weight: 500;
  font-family: "Inter", sans-serif;
  cursor: pointer;
  text-align: left;
  transition: background 0.15s, color 0.15s;
  margin-bottom: 3px;
}

.dash-nav-item:hover {
  background: rgba(249, 115, 22, 0.12);
  color: #f97316;
}

.dash-nav-item.active {
  background: rgba(249, 115, 22, 0.2);
  color: #f97316;
  font-weight: 700;
}

.dash-nav-item.active .dash-nav-icon {
  color: #f97316;
}

.dash-nav-item#logoutBtn {
  color: #f43f5e;
}

.dash-nav-item#logoutBtn:hover {
  background: rgba(244, 63, 94, 0.12);
}

.dash-nav-icon {
  width: 18px;
  height: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.d-sidebar-divider {
  height: 1px;
  background: var(--border);
  margin: 8px 12px;
}

.d-sidebar-footer {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  min-height: 0;
  background: rgba(0, 0, 0, 0.2);
}

.d-sidebar-footer .sf-info {
  min-width: 0;
}

.d-sidebar-footer .sf-name {
  font-weight: 700;
  font-size: 0.84rem;
  color: white;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.d-sidebar-footer .sf-rank {
  font-size: 0.73rem;
  color: #f97316;
  font-weight: 600;
}

/* -- Main Content ----------------------------------- */
.d-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  min-width: 0;
  background: rgba(11, 15, 23, 0.4);
}

.d-main-header {
  padding: 18px 24px 14px;
  background: rgba(15, 23, 34, 0.5);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  gap: 12px;
}

.d-main-header .header-title-wrap .header-greeting {
  font-size: 0.72rem;
  font-weight: 600;
  color: #f97316;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 2px;
}

.d-main-header .header-title-wrap h1 {
  font-size: 1.35rem;
  font-weight: 800;
  background: linear-gradient(135deg, #fff, #f97316);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  letter-spacing: -0.03em;
}

.d-header-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.d-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: 9px;
  font-size: 0.83rem;
  font-weight: 600;
  font-family: "Inter", sans-serif;
  cursor: pointer;
  text-decoration: none;
  border: none;
  transition: background 0.15s, transform 0.1s;
  white-space: nowrap;
}

.d-btn.primary {
  background: linear-gradient(135deg, #f97316, #f43f5e);
  color: #fff;
  box-shadow: 0 2px 8px rgba(249, 115, 22, 0.3);
}

.d-btn.primary:hover {
  background: linear-gradient(135deg, #ea580c, #e11d48);
  transform: translateY(-1px);
}

.d-btn.ghost {
  background: rgba(255, 255, 255, 0.05);
  color: var(--text-2);
  border: 1px solid var(--border);
}

.d-btn.ghost:hover {
  background: rgba(255, 255, 255, 0.1);
}

.d-tab-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
}

.d-tab-body::-webkit-scrollbar {
  width: 4px;
}

.d-tab-body::-webkit-scrollbar-track {
  background: rgba(255, 255, 255, 0.05);
  border-radius: 99px;
}

.d-tab-body::-webkit-scrollbar-thumb {
  background: #f97316;
  border-radius: 99px;
}

/* -- Overview: Profile + Stats row ----------------- */
.d-overview-top {
  display: grid;
  grid-template-columns: 260px 1fr;
  gap: 16px;
  margin-bottom: 16px;
}

.d-profile-card {
  background: rgba(18, 24, 38, 0.7);
  backdrop-filter: blur(12px);
  border-radius: 16px;
  padding: 22px 20px;
  border: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  gap: 8px;
}

/* Avatar sizes */
.avatar {
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
  display: block;
}

.avatar-xs {
  width: 28px;
  height: 28px;
}

.avatar-sm {
  width: 40px;
  height: 40px;
}

.avatar-md {
  width: 56px;
  height: 56px;
}

.avatar-lg {
  width: 88px;
  height: 88px;
  border: 3px solid rgba(249, 115, 22, 0.3);
}

.avatar-xl {
  width: 120px;
  height: 120px;
  border: 3px solid rgba(249, 115, 22, 0.3);
}

.avatar-init {
  background: rgba(249, 115, 22, 0.2);
  color: #f97316;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 0.78rem;
}

.d-profile-card .pc-avatar {
  margin-bottom: 4px;
}

.d-profile-card .pc-name {
  font-weight: 800;
  font-size: 1.05rem;
  color: white;
}

.d-profile-card .pc-rank {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: rgba(249, 115, 22, 0.2);
  color: #f97316;
  padding: 3px 10px;
  border-radius: 99px;
  font-size: 0.72rem;
  font-weight: 700;
}

.d-profile-card .pc-meta {
  font-size: 0.78rem;
  color: var(--text-3);
}

.d-profile-card .pc-stats {
  display: flex;
  gap: 0;
  width: 100%;
  border-top: 1px solid var(--border);
  padding-top: 14px;
  margin-top: 6px;
}

.d-profile-card .pc-stat {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  border-right: 1px solid var(--border);
}

.d-profile-card .pc-stat:last-child {
  border-right: none;
}

.d-profile-card .pc-stat-val {
  font-size: 1.1rem;
  font-weight: 800;
  color: #f97316;
}

.d-profile-card .pc-stat-lbl {
  font-size: 0.68rem;
  color: var(--text-3);
  font-weight: 500;
}

/* -- Stat cards grid (right of profile) ------------ */
.d-stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 12px;
}

.d-stat-card {
  background: rgba(18, 24, 38, 0.7);
  backdrop-filter: blur(12px);
  border-radius: 14px;
  padding: 16px 18px;
  border: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 6px;
  position: relative;
  overflow: hidden;
}

.d-stat-card .sc-icon {
  width: 38px;
  height: 38px;
  border-radius: 11px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.d-stat-card .sc-label {
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.d-stat-card .sc-value {
  font-size: 1.6rem;
  font-weight: 900;
  color: white;
  letter-spacing: -0.04em;
  line-height: 1;
}

.d-stat-card.sc-green .sc-icon {
  background: rgba(249, 115, 22, 0.2);
  color: #f97316;
}

.d-stat-card.sc-gold .sc-icon {
  background: rgba(245, 158, 11, 0.2);
  color: #f59e0b;
}

.d-stat-card.sc-coral .sc-icon {
  background: rgba(244, 63, 94, 0.2);
  color: #f43f5e;
}

.d-stat-card.sc-purple .sc-icon {
  background: rgba(168, 85, 247, 0.2);
  color: #a855f7;
}

.d-stat-card .sc-blob {
  position: absolute;
  width: 80px;
  height: 80px;
  border-radius: 50%;
  top: -20px;
  right: -20px;
  opacity: 0.07;
}

.d-stat-card.sc-green .sc-blob {
  background: #f97316;
}

.d-stat-card.sc-gold .sc-blob {
  background: #f59e0b;
}

.d-stat-card.sc-coral .sc-blob {
  background: #f43f5e;
}

.d-stat-card.sc-purple .sc-blob {
  background: #a855f7;
}

/* -- Summary cards (colorful) ----------------------- */
.d-summary-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-bottom: 18px;
}

.d-summary-card {
  border-radius: 14px;
  padding: 18px 20px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
}

.d-summary-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(0, 0, 0, 0.3);
}

.d-summary-card .sc2-label {
  font-size: 0.75rem;
  font-weight: 700;
  opacity: 0.75;
  display: flex;
  align-items: center;
  gap: 6px;
}

.d-summary-card .sc2-value {
  font-size: 1.9rem;
  font-weight: 900;
  letter-spacing: -0.04em;
  line-height: 1.1;
}

.d-summary-card .sc2-sub {
  font-size: 0.72rem;
  opacity: 0.7;
}

.d-summary-card .sc2-arrow {
  position: absolute;
  right: 14px;
  top: 14px;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
}

.d-summary-card.green {
  background: linear-gradient(135deg, #f97316, #ea580c);
  color: #fff;
}

.d-summary-card.gold {
  background: linear-gradient(135deg, #f59e0b, #d97706);
  color: #fff;
}

.d-summary-card.coral {
  background: linear-gradient(135deg, #f43f5e, #e11d48);
  color: #fff;
}

/* -- Recent orders in overview ---------------------- */
.d-section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.d-section-header h3 {
  font-size: 0.95rem;
  font-weight: 800;
  color: white;
}

.d-section-header a {
  font-size: 0.78rem;
  font-weight: 600;
  color: #f97316;
  text-decoration: none;
}

.d-section-header a:hover {
  text-decoration: underline;
}

/* -- Tabs other than overview ----------------------- */
.d-tab-title {
  font-size: 1.15rem;
  font-weight: 800;
  background: linear-gradient(135deg, #fff, #f97316);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  margin-bottom: 16px;
  letter-spacing: -0.02em;
}

.tab-pills {
  display: flex;
  gap: 6px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}

.tab-pill {
  padding: 5px 14px;
  border-radius: 99px;
  font-size: 0.78rem;
  font-weight: 600;
  border: 1.5px solid var(--border);
  background: rgba(18, 24, 38, 0.7);
  color: var(--text-2);
  cursor: pointer;
  font-family: "Inter", sans-serif;
  transition: all 0.15s;
}

.tab-pill.active {
  background: linear-gradient(135deg, #f97316, #f43f5e);
  color: #fff;
  border-color: transparent;
}

.tab-pill:hover:not(.active) {
  border-color: #f97316;
  color: #f97316;
}

/* -- Right panel ------------------------------------ */
.d-right {
  width: var(--right-w);
  flex-shrink: 0;
  background: rgba(15, 23, 34, 0.7);
  backdrop-filter: blur(12px);
  border-left: 1px solid var(--border);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.d-right-header {
  padding: 18px 18px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.d-right-header h3 {
  font-size: 0.9rem;
  font-weight: 800;
  color: white;
}

.d-right-refresh {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.05);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-3);
  transition: background 0.15s;
}

.d-right-refresh:hover {
  background: rgba(249, 115, 22, 0.2);
  color: #f97316;
}

.d-right-body {
  flex: 1;
  overflow-y: auto;
  padding: 12px 14px;
}

.d-right-body::-webkit-scrollbar {
  width: 3px;
}

.d-right-body::-webkit-scrollbar-track {
  background: rgba(255, 255, 255, 0.05);
  border-radius: 99px;
}

.d-right-body::-webkit-scrollbar-thumb {
  background: #f97316;
  border-radius: 99px;
}

/* Messages panel */
.dm-conv-list {
  flex: 1;
  overflow-y: auto;
}

.dm-conv-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background 0.12s;
}

.dm-conv-item:hover,
.dm-conv-item.active {
  background: rgba(249, 115, 22, 0.12);
}

.dm-conv-avatar {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: rgba(249, 115, 22, 0.2);
  color: #f97316;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 0.78rem;
  flex-shrink: 0;
}

.dm-conv-info {
  min-width: 0;
  flex: 1;
}

.dm-conv-name {
  font-size: 0.82rem;
  font-weight: 600;
  color: white;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.dm-conv-preview {
  font-size: 0.72rem;
  color: var(--text-3);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.dm-thread {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.dm-thread-header {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.dm-back-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: #f97316;
  font-size: 0.78rem;
  font-weight: 700;
  padding: 0;
  flex-shrink: 0;
}

.dm-thread-name {
  font-size: 0.85rem;
  font-weight: 700;
  color: white;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.dm-messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px 14px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.dm-messages::-webkit-scrollbar {
  width: 3px;
}

.dm-messages::-webkit-scrollbar-track {
  background: rgba(255, 255, 255, 0.05);
  border-radius: 99px;
}

.dm-messages::-webkit-scrollbar-thumb {
  background: #f97316;
  border-radius: 99px;
}

.dm-bubble {
  max-width: 82%;
  padding: 7px 11px;
  border-radius: 12px;
  font-size: 0.8rem;
  line-height: 1.4;
  word-break: break-word;
}

.dm-bubble.self {
  background: linear-gradient(135deg, #f97316, #f43f5e);
  color: #fff;
  align-self: flex-end;
  border-bottom-right-radius: 3px;
}

.dm-bubble.other {
  background: rgba(255, 255, 255, 0.1);
  color: var(--text-2);
  align-self: flex-start;
  border-bottom-left-radius: 3px;
}

.dm-input-row {
  padding: 8px 10px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}

.dm-input-row input {
  flex: 1;

input[type="text"],
input[type="email"],
textarea,
select {
  width: 100%;
  padding: 9px 12px;
  border: 1.5px solid var(--border);
  border-radius: 9px;
  font-size: 0.88rem;
  font-family: "Inter", sans-serif;
  color: white;
  background: rgba(255, 255, 255, 0.05);
  outline: none;
  transition: border-color 0.15s;
}

input:focus,
textarea:focus,
select:focus {
  border-color: #f97316;
}

.stars {
  color: #f59e0b;
  font-size: 0.85rem;
}

.loading-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 3rem;
}

.spinner {
  width: 28px;
  height: 28px;
  border: 3px solid rgba(249, 115, 22, 0.2);
  border-top-color: #f97316;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}

#toast-container {
  position: fixed;
  bottom: 20px;
  right: 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 9999;
  pointer-events: none;
}

.toast {
  padding: 10px 16px;
  border-radius: 10px;
  font-size: 0.84rem;
  font-weight: 600;
  pointer-events: auto;
  background: #1e293b;
  color: #fff;
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.18);
  animation: fadeIn 0.2s ease;
}

.toast.success {
  background: linear-gradient(135deg, #f97316, #ea580c);
}

.toast.error {
  background: #f43f5e;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(8px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

      <section id="tab-orders" class="dashboard-tab">
        <div class="d-tab-title">Orders</div>
        <div class="tab-pills mb-3" id="orderTabs">
          <button class="tab-pill active" data-status="all">All</button>
          <button class="tab-pill" data-status="pending">Pending</button>
          <button class="tab-pill" data-status="accepted">Accepted</button>
          <button class="tab-pill" data-status="completed">Completed</button>
        </div>
        <div id="ordersList"></div>
      </section>

      <!-- -- BOOKINGS -------------------------------- -->
      <section id="tab-bookings" class="dashboard-tab">
        <div class="d-tab-title">My bookings</div>
        <div class="tab-pills mb-3" id="bookingTabs">
          <button class="tab-pill active" data-bstatus="all">All</button>
          <button class="tab-pill" data-bstatus="pending">Pending</button>
          <button class="tab-pill" data-bstatus="accepted">Accepted</button>
          <button class="tab-pill" data-bstatus="completed">Completed</button>
        </div>
        <div id="bookingsList"></div>
      </section>

      <!-- -- REVIEWS --------------------------------- -->
      <section id="tab-reviews" class="dashboard-tab">
        <div class="tab-pills mb-3" id="reviewViewTabs">
          <button class="tab-pill active" data-rview="received">Reviews received</button>
          <button class="tab-pill" data-rview="written">Reviews I wrote</button>
        </div>
        <div id="reviewsList"></div>
        <div id="reviewsWrittenList" style="display:none"></div>
      </section>

      <!-- -- REPORTS --------------------------------- -->
      <section id="tab-reports" class="dashboard-tab">
        <div class="d-tab-title" style="margin-bottom:6px">Reports &amp; Exports</div>
        <p style="font-size:.85rem;color:#6b7280;margin-bottom:22px">Download your data as a PDF or CSV file.</p>
        <div id="reportsGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px"></div>
      </section>

      <!-- -- SETTINGS -------------------------------- -->
      <section id="tab-settings" class="dashboard-tab">
        <div class="d-tab-title">Account settings</div>
        <div class="card card-pad" style="max-width:560px">
          <form id="settingsForm" class="form-grid">
            <div class="form-group">
              <label class="form-label">Avatar</label>
              <div class="flex items-center gap-2" style="align-items:center">
                <div id="avatarPreview"></div>
                <label class="btn btn-ghost btn-sm" style="cursor:pointer;margin-left:8px">
                  Change photo
                  <input type="file" id="avatarInput" accept="image/jpeg,image/png,image/webp,image/gif" style="display:none">
                </label>
              </div>
            </div>
            <div class="form-grid-2">
              <div class="form-group">
                <label class="form-label" for="settingsName">Display name</label>
                <input type="text" id="settingsName" name="name">
              </div>
              <div class="form-group">
                <label class="form-label" for="settingsUni">University / Faculty</label>
                <input type="text" id="settingsUni" name="university">
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" for="settingsYear">Year of study</label>
              <select id="settingsYear" name="year_of_study">
                <option value="">Select year</option>
                <option value="1">1st year</option>
                <option value="2">2nd year</option>
                <option value="3">3rd year</option>
                <option value="4">4th year</option>
                <option value="5">5th year</option>
                <option value="6">Postgrad</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="settingsBio">Bio</label>
              <textarea id="settingsBio" name="bio" rows="3" placeholder="Tell buyers about yourself..."></textarea>
            </div>
            <div class="form-group">
              <label class="form-label" for="settingsSkills">Skills (comma-separated)</label>
              <input type="text" id="settingsSkills" name="skills" placeholder="e.g. Maths, Python, Photography">
            </div>
            <button type="submit" class="btn btn-primary" id="saveSettingsBtn" style="width:fit-content">Save changes</button>
          </form>
        </div>
      </section>

    </div><!-- /d-tab-body -->
  </main>

    <!-- -- RIGHT PANEL: Messages --------------------------------- -->
  <aside class="d-right">
    <div class="d-right-header">
      <h3>Messages</h3>
      <a href="/pages/inbox.html" class="d-right-refresh" title="Open full inbox" style="text-decoration:none">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      </a>
    </div>
    <!-- Conversation list -->
    <div id="dmConvList" class="dm-conv-list">
      <div class="loading-wrap"><div class="spinner"></div></div>
    </div>
    <!-- Thread view (shown when a conversation is open) -->
    <div id="dmThread" class="dm-thread" style="display:none"></div>
  </aside>

</div><!-- /d-shell -->

<!-- ── Review Modal ──────────────────────────────────────────────────── -->
<div id="reviewModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9000;align-items:center;justify-content:center;padding:1rem">
  <div style="background:#fff;border-radius:20px;padding:28px 28px 24px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.2);position:relative">
    <button id="reviewModalClose" style="position:absolute;top:14px;right:14px;background:none;border:none;cursor:pointer;color:var(--text-3);font-size:1.2rem;line-height:1;padding:4px">&times;</button>
    <h3 style="font-size:1.05rem;font-weight:800;color:#111827;margin-bottom:4px">Leave a review</h3>
    <p id="reviewModalSub" style="font-size:.8rem;color:var(--text-3);margin-bottom:20px"></p>
    <div style="margin-bottom:16px">
      <div style="font-size:.78rem;font-weight:600;color:var(--text-2);margin-bottom:8px">Your rating</div>
      <div id="starPicker" style="display:flex;gap:6px;font-size:1.8rem;cursor:pointer">
        <span data-star="1">&#9733;</span>
        <span data-star="2">&#9733;</span>
        <span data-star="3">&#9733;</span>
        <span data-star="4">&#9733;</span>
        <span data-star="5">&#9733;</span>
      </div>
    </div>
    <div class="form-group" style="margin-bottom:18px">
      <label class="form-label">Review</label>
      <textarea id="reviewContent" rows="3" placeholder="Share your experience with this seller..." style="resize:vertical"></textarea>
    </div>
    <button id="reviewSubmitBtn" class="btn btn-primary w-full" style="width:100%;padding:11px;font-size:.88rem">Submit review</button>
  </div>
</div>

<div id="toast-container"></div>

</body>
