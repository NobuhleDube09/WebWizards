<!doctype html>
<html lang="en">
<head>
  <script>(function(){if(localStorage.getItem("cc_theme")==="dark")document.documentElement.setAttribute("data-theme","dark");}());</script>
  <link rel="stylesheet" href="/css/dark.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="icon" href="/assets/campus_logo.svg" type="image/svg+xml">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Dashboard � CampusConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --primary:   #00C97F;
      --primary-d: #00a868;
      --primary-bg:#e6fff4;
      --gold:      #f59e0b;
      --gold-bg:   #fffbeb;
      --coral:     #ef4444;
      --coral-bg:  #fff1f2;
      --purple:    #8b5cf6;
      --purple-bg: #f5f3ff;
      --text:      #111827;
      --text-2:    #4b5563;
      --text-3:    #9ca3af;
      --border:    #e5e7eb;
      --bg:        #f3f5f4;
      --sidebar-w: 250px;
      --right-w:   270px;
    }

    html, body { height:100%; overflow:hidden; font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); }

    /* -- 3-Column Shell -------------------------------- */
    .d-shell { display:flex; height:100vh; overflow:hidden; }

    /* -- Sidebar --------------------------------------- */
    .d-sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: #fff;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    .d-sidebar-logo {
      padding: 20px 20px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sidebar-logo {
      height: 40px;
      width: auto;
      display: block;
      flex-shrink: 0;
    }
    .logo-name {
      font-weight: 800;
      font-size: 1rem;
      color: var(--text);
      letter-spacing: -.02em;
      white-space: nowrap;
    }
    .d-sidebar-section-label {
      padding: 20px 20px 8px;
      font-size: .68rem;
      font-weight: 700;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: .08em;
      flex-shrink: 0;
    }
    .d-sidebar-nav { flex:1; overflow-y:auto; padding: 4px 12px 12px; }
    .d-sidebar-nav::-webkit-scrollbar { width:3px; }
    .d-sidebar-nav::-webkit-scrollbar-thumb { background:var(--border); border-radius:99px; }
    .dash-nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 11px 14px;
      border: none;
      border-radius: 10px;
      background: transparent;
      color: var(--text-2);
      font-size: .88rem;
      font-weight: 500;
      font-family: 'Inter',sans-serif;
      cursor: pointer;
      text-align: left;
      transition: background .15s, color .15s;
      margin-bottom: 3px;
    }
    .dash-nav-item:hover { background:#f3f5f4; color:var(--text); }
    .dash-nav-item.active { background:var(--primary-bg); color:var(--primary-d); font-weight:700; }
    .dash-nav-item.active .dash-nav-icon { color:var(--primary); }
    .dash-nav-item#logoutBtn { color:#ef4444; }
    .dash-nav-item#logoutBtn:hover { background:#fff1f2; }
    .dash-nav-icon { width:18px; height:18px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .d-sidebar-divider { height:1px; background:var(--border); margin:8px 12px; }
    .d-sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      min-height: 0;
    }
    .d-sidebar-footer .sf-info { min-width:0; }
    .d-sidebar-footer .sf-name { font-weight:700; font-size:.84rem; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .d-sidebar-footer .sf-rank { font-size:.73rem; color:var(--primary-d); font-weight:600; }

    /* -- Main Content ----------------------------------- */
    .d-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      min-width: 0;
    }
    .d-main-header {
      padding: 18px 24px 14px;
      background: #fff;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      gap: 12px;
    }
    .d-main-header .header-title-wrap .header-greeting {
      font-size: .72rem;
      font-weight: 600;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 2px;
    }
    .d-main-header .header-title-wrap h1 {
      font-size: 1.35rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -.03em;
    }
    .d-header-actions { display:flex; align-items:center; gap:8px; flex-shrink:0; }
    .d-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 9px;
      font-size: .83rem;
      font-weight: 600;
      font-family: 'Inter',sans-serif;
      cursor: pointer;
      text-decoration: none;
      border: none;
      transition: background .15s, transform .1s;
      white-space: nowrap;
    }
    .d-btn.primary { background:var(--primary); color:#fff; box-shadow:0 2px 8px rgba(0,201,127,.3); }
    .d-btn.primary:hover { background:var(--primary-d); transform:translateY(-1px); }
    .d-btn.ghost { background:#f3f5f4; color:var(--text-2); border:1px solid var(--border); }
    .d-btn.ghost:hover { background:var(--border); }

    .d-tab-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
    }
    .d-tab-body::-webkit-scrollbar { width:4px; }
    .d-tab-body::-webkit-scrollbar-thumb { background:var(--border); border-radius:99px; }

    /* -- Overview: Profile + Stats row ----------------- */
    .d-overview-top {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    .d-profile-card {
      background: #fff;
      border-radius: 16px;
      padding: 22px 20px;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 8px;
    }
    /* -- Avatar sizes (mirrors styles.css — not linked in this page) ------- */
    .avatar { border-radius:50%; object-fit:cover; flex-shrink:0; display:block; }
    .avatar-xs { width:28px;  height:28px; }
    .avatar-sm { width:40px;  height:40px; }
    .avatar-md { width:56px;  height:56px; }
    .avatar-lg { width:88px;  height:88px; border:3px solid var(--border); }
    .avatar-xl { width:120px; height:120px; border:3px solid var(--border); }
    .avatar-init { background:var(--primary-bg); color:var(--primary-d); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:.78rem; }

    .d-profile-card .pc-avatar { margin-bottom: 4px; }
    .d-profile-card .pc-name { font-weight:800; font-size:1.05rem; color:var(--text); }
    .d-profile-card .pc-rank {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--primary-bg);
      color: var(--primary-d);
      padding: 3px 10px;
      border-radius: 99px;
      font-size: .72rem;
      font-weight: 700;
    }
    .d-profile-card .pc-meta { font-size:.78rem; color:var(--text-3); }
    .d-profile-card .pc-stats {
      display: flex;
      gap: 0;
      width: 100%;
      border-top: 1px solid var(--border);
      padding-top: 14px;
      margin-top: 6px;
    }
    .d-profile-card .pc-stat {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      border-right: 1px solid var(--border);
    }
    .d-profile-card .pc-stat:last-child { border-right: none; }
    .d-profile-card .pc-stat-val { font-size:1.1rem; font-weight:800; color:var(--text); }
    .d-profile-card .pc-stat-lbl { font-size:.68rem; color:var(--text-3); font-weight:500; }

    /* -- Stat cards grid (right of profile) ------------ */
    .d-stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 12px;
    }
    .d-stat-card {
      background: #fff;
      border-radius: 14px;
      padding: 16px 18px;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 6px;
      position: relative;
      overflow: hidden;
    }
    .d-stat-card .sc-icon {
      width: 38px; height: 38px;
      border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .d-stat-card .sc-label { font-size:.72rem; font-weight:600; color:var(--text-3); text-transform:uppercase; letter-spacing:.05em; }
    .d-stat-card .sc-value { font-size:1.6rem; font-weight:900; color:var(--text); letter-spacing:-.04em; line-height:1; }
    .d-stat-card.sc-green .sc-icon { background:var(--primary-bg); color:var(--primary); }
    .d-stat-card.sc-gold .sc-icon { background:var(--gold-bg); color:var(--gold); }
    .d-stat-card.sc-coral .sc-icon { background:var(--coral-bg); color:var(--coral); }
    .d-stat-card.sc-purple .sc-icon { background:var(--purple-bg); color:var(--purple); }
    .d-stat-card .sc-blob {
      position: absolute;
      width: 80px; height: 80px;
      border-radius: 50%;
      top: -20px; right: -20px;
      opacity: .07;
    }
    .d-stat-card.sc-green .sc-blob { background:var(--primary); }
    .d-stat-card.sc-gold .sc-blob { background:var(--gold); }
    .d-stat-card.sc-coral .sc-blob { background:var(--coral); }
    .d-stat-card.sc-purple .sc-blob { background:var(--purple); }

    /* -- Summary cards (colorful) ----------------------- */
    .d-summary-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 18px;
    }
    .d-summary-card {
      border-radius: 14px;
      padding: 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
    }
    .d-summary-card:hover { transform:translateY(-2px); box-shadow:0 6px 24px rgba(0,0,0,.08); }
    .d-summary-card .sc2-label { font-size:.75rem; font-weight:700; opacity:.75; display:flex; align-items:center; gap:6px; }
    .d-summary-card .sc2-value { font-size:1.9rem; font-weight:900; letter-spacing:-.04em; line-height:1.1; }
    .d-summary-card .sc2-sub { font-size:.72rem; opacity:.7; }
    .d-summary-card .sc2-arrow {
      position:absolute; right:14px; top:14px;
      width:22px; height:22px; border-radius:50%;
      background:rgba(255,255,255,.25);
      display:flex; align-items:center; justify-content:center;
      font-size:.9rem;
    }
    .d-summary-card.green { background: linear-gradient(135deg,#00C97F,#00a868); color:#fff; }
    .d-summary-card.gold  { background: linear-gradient(135deg,#f59e0b,#d97706); color:#fff; }
    .d-summary-card.coral { background: linear-gradient(135deg,#f43f5e,#e11d48); color:#fff; }

    /* -- Recent orders in overview ---------------------- */
    .d-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .d-section-header h3 { font-size:.95rem; font-weight:800; color:var(--text); }
    .d-section-header a  { font-size:.78rem; font-weight:600; color:var(--primary-d); text-decoration:none; }

    /* -- Tabs other than overview ----------------------- */
    .d-tab-title {
      font-size:1.15rem; font-weight:800; color:var(--text);
      margin-bottom:16px; letter-spacing:-.02em;
    }
    .tab-pills { display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap; }
    .tab-pill {
      padding: 5px 14px;
      border-radius: 99px;
      font-size: .78rem;
      font-weight: 600;
      border: 1.5px solid var(--border);
      background: #fff;
      color: var(--text-2);
      cursor: pointer;
      font-family: 'Inter',sans-serif;
      transition: all .15s;
    }
    .tab-pill.active { background:var(--primary); color:#fff; border-color:var(--primary); }

    /* -- Right panel ------------------------------------ */
    .d-right {
      width: var(--right-w);
      flex-shrink: 0;
      background: #fff;
      border-left: 1px solid var(--border);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .d-right-header {
      padding: 18px 18px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .d-right-header h3 { font-size:.9rem; font-weight:800; color:var(--text); }
    .d-right-refresh {
      width:28px; height:28px; border-radius:50%;
      background:#f3f5f4; border:none; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      color:var(--text-3); transition:background .15s;
    }
    .d-right-refresh:hover { background:var(--border); }
    .d-right-body { flex:1; overflow-y:auto; padding:12px 14px; }
    .d-right-body::-webkit-scrollbar { width:3px; }
    .d-right-body::-webkit-scrollbar-thumb { background:var(--border); border-radius:99px; }

    /* Messages panel */
    .dm-conv-list { flex:1; overflow-y:auto; }
    .dm-conv-item { display:flex; align-items:center; gap:10px; padding:10px 14px; cursor:pointer; border-bottom:1px solid var(--border); transition:background .12s; }
    .dm-conv-item:hover, .dm-conv-item.active { background:var(--primary-bg); }
    .dm-conv-avatar { width:34px; height:34px; border-radius:50%; background:var(--primary-bg); color:var(--primary-d); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:.78rem; flex-shrink:0; }
    .dm-conv-info { min-width:0; flex:1; }
    .dm-conv-name { font-size:.82rem; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .dm-conv-preview { font-size:.72rem; color:var(--text-3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .dm-thread { flex:1; display:flex; flex-direction:column; overflow:hidden; }
    .dm-thread-header { padding:10px 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; flex-shrink:0; }
    .dm-back-btn { background:none; border:none; cursor:pointer; color:var(--primary); font-size:.78rem; font-weight:700; padding:0; flex-shrink:0; }
    .dm-thread-name { font-size:.85rem; font-weight:700; color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .dm-messages { flex:1; overflow-y:auto; padding:10px 14px; display:flex; flex-direction:column; gap:6px; }
    .dm-messages::-webkit-scrollbar { width:3px; }
    .dm-messages::-webkit-scrollbar-thumb { background:var(--border); border-radius:99px; }
    .dm-bubble { max-width:82%; padding:7px 11px; border-radius:12px; font-size:.8rem; line-height:1.4; word-break:break-word; }
    .dm-bubble.self { background:var(--primary); color:#fff; align-self:flex-end; border-bottom-right-radius:3px; }
    .dm-bubble.other { background:#f0f2f1; color:var(--text); align-self:flex-start; border-bottom-left-radius:3px; }
    .dm-input-row { padding:8px 10px; border-top:1px solid var(--border); display:flex; gap:6px; flex-shrink:0; }
    .dm-input-row input { flex:1; border:1px solid var(--border); border-radius:8px; padding:6px 10px; font-size:.8rem; font-family:inherit; outline:none; min-width:0; }
    .dm-input-row input:focus { border-color:var(--primary); }
    .dm-empty { flex:1; display:flex; align-items:center; justify-content:center; flex-direction:column; color:var(--text-3); font-size:.8rem; text-align:center; padding:2rem 1rem; gap:8px; }
    .dm-role-badge { font-size:.6rem; font-weight:700; letter-spacing:.04em; padding:1px 5px; border-radius:4px; text-transform:uppercase; flex-shrink:0; }
    .dm-role-badge.buyer  { background:#e8f0fe; color:#3b5bdb; }
    .dm-role-badge.seller { background:#fff0e6; color:#d9480f; }

    /* Shared card styles reused from styles.css equivalents */
    .order-card { background:#fff; border:1px solid var(--border); border-radius:14px; padding:16px; margin-bottom:10px; }
    .order-card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
    .badge { display:inline-flex; align-items:center; padding:3px 10px; border-radius:99px; font-size:.72rem; font-weight:700; }
    .badge-yellow { background:#fffbeb; color:#b45309; }
    .badge-teal   { background:var(--primary-bg); color:var(--primary-d); }
    .badge-red    { background:var(--coral-bg); color:var(--coral); }
    .badge-muted  { background:#f3f5f4; color:var(--text-3); }
    .btn { display:inline-flex; align-items:center; gap:5px; padding:7px 14px; border-radius:8px; font-size:.82rem; font-weight:600; font-family:'Inter',sans-serif; cursor:pointer; border:none; text-decoration:none; transition:background .15s; }
    .btn-primary { background:var(--primary); color:#fff; }
    .btn-primary:hover { background:var(--primary-d); }
    .btn-ghost { background:#f3f5f4; color:var(--text-2); border:1px solid var(--border); }
    .btn-ghost:hover { background:var(--border); }
    .btn-sm { padding:5px 12px; font-size:.78rem; }
    .review-card { background:#fff; border:1px solid var(--border); border-radius:14px; padding:14px; margin-bottom:10px; }
    .review-header { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
    .review-body { font-size:.84rem; color:var(--text-2); line-height:1.5; }
    .listings-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:16px; }
    .listing-card { background:#fff; border:1px solid var(--border); border-radius:14px; overflow:hidden; transition:box-shadow .18s,transform .18s; cursor:pointer; }
    .listing-card:hover { box-shadow:0 6px 24px rgba(0,0,0,.08); transform:translateY(-2px); }
    .listing-card img { width:100%; height:140px; object-fit:cover; display:block; }
    .listing-card-body { padding:12px 14px; }
    .listing-img-placeholder { width:100%; height:140px; background:var(--primary-bg); display:flex; align-items:center; justify-content:center; font-size:.78rem; font-weight:600; color:var(--primary-d); }
    /* dashboard-specific listing card override */
    .dl-card { background:#fff; border:1px solid var(--border); border-radius:14px; overflow:hidden; transition:box-shadow .18s,transform .18s; display:flex; flex-direction:column; }
    .dl-card:hover { box-shadow:0 6px 24px rgba(0,0,0,.09); transform:translateY(-2px); }
    .dl-card-img { width:100%; height:140px; object-fit:cover; display:block; background:var(--primary-bg); flex-shrink:0; }
    .dl-card-img-placeholder { width:100%; height:140px; background:linear-gradient(135deg,var(--primary-bg),#e8f5ff); display:flex; align-items:center; justify-content:center; flex-direction:column; gap:6px; color:var(--primary-d); font-weight:700; font-size:.8rem; flex-shrink:0; }
    .dl-card-body { padding:12px 14px 10px; flex:1; display:flex; flex-direction:column; gap:4px; }
    .dl-card-title { font-weight:700; font-size:.9rem; color:var(--text); line-height:1.3; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .dl-card-meta { font-size:.75rem; color:var(--text-3); display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-top:2px; }
    .dl-card-price { font-weight:800; font-size:.95rem; color:var(--primary-d); margin-top:auto; padding-top:8px; }
    .dl-card-actions { display:flex; gap:6px; padding:8px 14px 12px; border-top:1px solid var(--border); }
    .dl-action-btn { flex:1; padding:6px 0; border-radius:8px; font-size:.75rem; font-weight:600; border:none; cursor:pointer; font-family:inherit; transition:background .15s; }
    .dl-action-edit   { background:var(--primary-bg); color:var(--primary-d); }
    .dl-action-edit:hover   { background:#d1fae5; }
    .dl-action-toggle { background:#fff7ed; color:#d97706; border:1px solid #fed7aa; }
    .dl-action-toggle:hover { background:#fef3c7; }
    .dl-action-delete { background:#fff1f2; color:#ef4444; border:1px solid #fecaca; }
    .dl-action-delete:hover { background:#fee2e2; }
    /* Empty state */
    .dl-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:4rem 2rem; gap:16px; text-align:center; border:2px dashed var(--border); border-radius:16px; background:#fafafa; margin-top:4px; }
    .dl-empty-icon { width:64px; height:64px; border-radius:16px; background:var(--primary-bg); display:flex; align-items:center; justify-content:center; color:var(--primary-d); }
    .dl-empty h3 { font-size:1.05rem; font-weight:800; color:var(--text); margin:0; }
    .dl-empty p  { font-size:.85rem; color:var(--text-3); margin:0; max-width:280px; line-height:1.5; }
    .flex { display:flex; } .gap-2 { gap:.5rem; } .mt-3 { margin-top:.75rem; } .mb-2 { margin-bottom:.5rem; } .mb-3 { margin-bottom:.75rem; } .flex-col { flex-direction:column; }
    .section-header { display:flex; align-items:center; justify-content:space-between; }
    .form-group { display:flex; flex-direction:column; gap:5px; }
    .form-label { font-size:.78rem; font-weight:600; color:var(--text-2); }
    .form-grid { display:flex; flex-direction:column; gap:14px; }
    .form-grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .card { background:#fff; border:1px solid var(--border); border-radius:14px; }
    .card-pad { padding:20px; }
    input[type=text], input[type=email], textarea, select {
      width:100%; padding:9px 12px; border:1.5px solid var(--border); border-radius:9px;
      font-size:.88rem; font-family:'Inter',sans-serif; color:var(--text);
      background:#fff; outline:none; transition:border-color .15s;
    }
    input:focus, textarea:focus, select:focus { border-color:var(--primary); }
    .stars { color:#f59e0b; font-size:.85rem; }
    .loading-wrap { display:flex; align-items:center; justify-content:center; padding:3rem; }
    .spinner { width:28px; height:28px; border:3px solid var(--border); border-top-color:var(--primary); border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    #toast-container { position:fixed; bottom:20px; right:20px; display:flex; flex-direction:column; gap:8px; z-index:9999; pointer-events:none; }
    .toast { padding:10px 16px; border-radius:10px; font-size:.84rem; font-weight:600; pointer-events:auto; background:#1a1a2e; color:#fff; box-shadow:0 4px 16px rgba(0,0,0,.18); animation:fadeIn .2s ease; }
    .toast.success { background:var(--primary-d); }
    .toast.error   { background:#ef4444; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    /* -- Dashboard tab visibility ----------------------- */
    .dashboard-tab { display:none; }
    .dashboard-tab.active-tab { display:block; }

    /* -- Responsive: hide right panel on smaller screens - */
    @media (max-width: 1200px) { .d-right { display:none; } }
    @media (max-width: 860px)  { .d-sidebar { width:64px; } .dash-nav-item span:not(.dash-nav-icon), .logo-name, .d-sidebar-section-label, .d-sidebar-footer .sf-info { display:none; } .d-sidebar-logo { justify-content:center; } .d-sidebar-footer { justify-content:center; } .d-overview-top { grid-template-columns:1fr; } .d-summary-row { grid-template-columns:1fr 1fr; } }
    @media (max-width: 600px)  {
      html, body { height: auto; overflow-y: auto; }
      .d-shell { height: auto; min-height: 100vh; overflow: visible; }
      .d-main { height: auto; overflow: visible; }
      .d-tab-body { overflow: visible; height: auto; padding:14px; }
      .d-sidebar { display:none; }
      .d-stats-grid { grid-template-columns:1fr 1fr; }
      .d-summary-row { grid-template-columns:1fr; }
      .d-main-header { padding:14px; }
    }
  </style>
</head>
<body>
<div class="d-shell">

  <!-- -- LEFT SIDEBAR ------------------------------------ -->
  <aside class="d-sidebar">
    <div class="d-sidebar-logo">
      <img src="/assets/logo_2.svg" class="sidebar-logo" alt="CampusConnect">

        <span>Browse</span>
      </a>
      <button class="dash-nav-item active" data-tab="overview">
        <span class="dash-nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></span>
        <span>Overview</span>
      </button>
      <button class="dash-nav-item" data-tab="listings">
        <span class="dash-nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></span>
        <span>My listings</span>
      </button>
      <button class="dash-nav-item" data-tab="orders">
        <span class="dash-nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg></span>
        <span>Orders</span>
      </button>
      <button class="dash-nav-item" data-tab="bookings">
        <span class="dash-nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
        <span>Bookings</span>
      </button>
      <button class="dash-nav-item" data-tab="reviews">
        <span class="dash-nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></span>
        <span>Reviews</span>
      </button>
      <div class="d-sidebar-divider"></div>
      <a class="dash-nav-item" href="/pages/admin.html" id="adminNavLink" style="display:none;color:#ef4444">
        <span class="dash-nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></span>
        <span>Admin Panel</span>
        <span style="margin-left:auto;font-size:.65rem;font-weight:700;background:#ef4444;color:#fff;padding:1px 6px;border-radius:99px">ADMIN</span>
      </a>
      <button class="dash-nav-item" data-tab="reports">
        <span class="dash-nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg></span>
        <span>Reports</span>
      </button>
      <button class="dash-nav-item" data-tab="settings">
        <span class="dash-nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span>
        <span>Settings</span>
      </button>
      <button class="dash-nav-item" id="logoutBtn">
        <span class="dash-nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></span>
        <span>Log out</span>
      </button>
    </nav>

    <div class="d-sidebar-footer" id="sidebarProfile">
      <div id="sidebarAvatarWrap"></div>
      <div class="sf-info">
        <div class="sf-name" id="sidebarName">�</div>
        <div class="sf-rank" id="sidebarRank"></div>
      </div>
    </div>
  </aside>

  <!-- -- MAIN CONTENT ------------------------------------- -->
  <main class="d-main">
    <!-- Header -->
    <div class="d-main-header">
      <div class="header-title-wrap">
        <div class="header-greeting" id="dashGreeting">GOOD MORNING</div>
        <h1 id="dashWelcomeName">Welcome back!</h1>
      </div>
      <div class="d-header-actions">
        <a href="/pages/listing-form.html" class="d-btn primary">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New listing
        </a>
      </div>
    </div>

    <!-- Scrollable tab area -->
    <div class="d-tab-body">

      <!-- -- OVERVIEW ------------------------------- -->
      <section id="tab-overview" class="dashboard-tab active-tab">

        <!-- Profile card + 4 stat cards -->
        <div class="d-overview-top">
          <div class="d-profile-card">
            <div class="pc-avatar" id="profileAvatarWrap"></div>
            <div class="pc-name" id="profileName">�</div>
            <span class="pc-rank" id="profileRank">�</span>
            <div class="pc-meta" id="profileMeta"></div>
            <div class="pc-stats">
              <div class="pc-stat">
                <span class="pc-stat-val" id="pcListings">0</span>
                <span class="pc-stat-lbl">Listings</span>
              </div>
              <div class="pc-stat">
                <span class="pc-stat-val" id="pcRating">�</span>
                <span class="pc-stat-lbl">Rating</span>
              </div>
              <div class="pc-stat">
                <span class="pc-stat-val" id="pcXp">0</span>
                <span class="pc-stat-lbl">XP</span>
              </div>
            </div>
          </div>

          <div class="d-stats-grid" id="statsGrid">
            <div class="loading-wrap" style="grid-column:span 2"><div class="spinner"></div></div>
          </div>
        </div>

        <!-- 3 Summary cards -->
        <div class="d-summary-row" id="summaryRow">
          <!-- populated by JS -->
        </div>

        <!-- Recent orders -->
        <div id="recentActivity"></div>

      </section>

      <!-- -- MY LISTINGS ---------------------------- -->
      <section id="tab-listings" class="dashboard-tab">
        <div class="section-header mb-3">
          <div class="d-tab-title">My listings</div>
          <a class="d-btn primary" href="/pages/listing-form.html">+ New listing</a>
        </div>
        <div id="myListings" class="listings-grid"></div>
      </section>

      <!-- -- ORDERS --------------------------------- -->
      <section id="tab-orders" class="dashboard-tab">
        <div class="d-tab-title">Orders</div>
        <div class="tab-pills mb-3" id="orderTabs">
          <button class="tab-pill active" data-status="all">All</button>
          <button class="tab-pill" data-status="pending">Pending</button>
          <button class="tab-pill" data-status="accepted">Accepted</button>
          <button class="tab-pill" data-status="completed">Completed</button>
        </div>
        <div id="ordersList"></div>
      </section>

      <!-- -- BOOKINGS -------------------------------- -->
      <section id="tab-bookings" class="dashboard-tab">
        <div class="d-tab-title">My bookings</div>
        <div class="tab-pills mb-3" id="bookingTabs">
          <button class="tab-pill active" data-bstatus="all">All</button>
          <button class="tab-pill" data-bstatus="pending">Pending</button>
          <button class="tab-pill" data-bstatus="accepted">Accepted</button>
          <button class="tab-pill" data-bstatus="completed">Completed</button>
        </div>
        <div id="bookingsList"></div>
      </section>

      <!-- -- REVIEWS --------------------------------- -->
      <section id="tab-reviews" class="dashboard-tab">
        <div class="tab-pills mb-3" id="reviewViewTabs">
          <button class="tab-pill active" data-rview="received">Reviews received</button>
          <button class="tab-pill" data-rview="written">Reviews I wrote</button>
        </div>
        <div id="reviewsList"></div>
        <div id="reviewsWrittenList" style="display:none"></div>
      </section>

      <!-- -- REPORTS --------------------------------- -->
      <section id="tab-reports" class="dashboard-tab">
        <div class="d-tab-title" style="margin-bottom:6px">Reports &amp; Exports</div>
        <p style="font-size:.85rem;color:#6b7280;margin-bottom:22px">Download your data as a PDF or CSV file.</p>
        <div id="reportsGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px"></div>
      </section>

      <!-- -- SETTINGS -------------------------------- -->
      <section id="tab-settings" class="dashboard-tab">
        <div class="d-tab-title">Account settings</div>
        <div class="card card-pad" style="max-width:560px">
          <form id="settingsForm" class="form-grid">
            <div class="form-group">
              <label class="form-label">Avatar</label>
              <div class="flex items-center gap-2" style="align-items:center">
                <div id="avatarPreview"></div>
                <label class="btn btn-ghost btn-sm" style="cursor:pointer;margin-left:8px">
                  Change photo
                  <input type="file" id="avatarInput" accept="image/jpeg,image/png,image/webp,image/gif" style="display:none">
                </label>
              </div>
            </div>
            <div class="form-grid-2">
              <div class="form-group">
                <label class="form-label" for="settingsName">Display name</label>
                <input type="text" id="settingsName" name="name">
              </div>
              <div class="form-group">
                <label class="form-label" for="settingsUni">University / Faculty</label>
                <input type="text" id="settingsUni" name="university">
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" for="settingsYear">Year of study</label>
              <select id="settingsYear" name="year_of_study">
                <option value="">Select year</option>
                <option value="1">1st year</option>
                <option value="2">2nd year</option>
                <option value="3">3rd year</option>
                <option value="4">4th year</option>
                <option value="5">5th year</option>
                <option value="6">Postgrad</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="settingsBio">Bio</label>
              <textarea id="settingsBio" name="bio" rows="3" placeholder="Tell buyers about yourself..."></textarea>
            </div>
            <div class="form-group">
              <label class="form-label" for="settingsSkills">Skills (comma-separated)</label>
              <input type="text" id="settingsSkills" name="skills" placeholder="e.g. Maths, Python, Photography">
            </div>
            <button type="submit" class="btn btn-primary" id="saveSettingsBtn" style="width:fit-content">Save changes</button>
          </form>
        </div>
      </section>

    </div><!-- /d-tab-body -->
  </main>

    <!-- -- RIGHT PANEL: Messages --------------------------------- -->
  <aside class="d-right">
    <div class="d-right-header">
      <h3>Messages</h3>
      <a href="/pages/inbox.html" class="d-right-refresh" title="Open full inbox" style="text-decoration:none">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      </a>
    </div>
    <!-- Conversation list -->
    <div id="dmConvList" class="dm-conv-list">
      <div class="loading-wrap"><div class="spinner"></div></div>
    </div>
    <!-- Thread view (shown when a conversation is open) -->
    <div id="dmThread" class="dm-thread" style="display:none"></div>
  </aside>

</div><!-- /d-shell -->

<!-- ── Review Modal ──────────────────────────────────────────────────── -->
<div id="reviewModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9000;align-items:center;justify-content:center;padding:1rem">
  <div style="background:#fff;border-radius:20px;padding:28px 28px 24px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.2);position:relative">
    <button id="reviewModalClose" style="position:absolute;top:14px;right:14px;background:none;border:none;cursor:pointer;color:var(--text-3);font-size:1.2rem;line-height:1;padding:4px">&times;</button>
    <h3 style="font-size:1.05rem;font-weight:800;color:var(--text);margin-bottom:4px">Leave a review</h3>
    <p id="reviewModalSub" style="font-size:.8rem;color:var(--text-3);margin-bottom:20px"></p>
    <div style="margin-bottom:16px">
      <div style="font-size:.78rem;font-weight:600;color:var(--text-2);margin-bottom:8px">Your rating</div>
      <div id="starPicker" style="display:flex;gap:6px;font-size:1.8rem;cursor:pointer">
        <span data-star="1">&#9733;</span>
        <span data-star="2">&#9733;</span>
        <span data-star="3">&#9733;</span>
        <span data-star="4">&#9733;</span>
        <span data-star="5">&#9733;</span>
      </div>
    </div>
    <div class="form-group" style="margin-bottom:18px">
      <label class="form-label">Review</label>
      <textarea id="reviewContent" rows="3" placeholder="Share your experience with this seller..." style="resize:vertical"></textarea>
    </div>
    <button id="reviewSubmitBtn" class="btn btn-primary w-full" style="width:100%;padding:11px;font-size:.88rem">Submit review</button>
  </div>
</div>

<div id="toast-container"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/config.js"></script>
<script>window.sbClient = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON);</script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/common.js"></script>
<script src="/js/dashboard.js"></script>
</body>
</html>
