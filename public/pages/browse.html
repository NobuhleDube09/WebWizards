<!doctype html>
<html lang="en">
<head>
  <script>(function(){if(localStorage.getItem("cc_theme")==="dark")document.documentElement.setAttribute("data-theme","dark");}());</script>
  <link rel="stylesheet" href="/css/dark.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/assets/campus_logo.svg" type="image/svg+xml">
  <title>Browse Services &mdash; CampusConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="browse.css">
</head>
<body>
<div class="b-shell">

  <!-- ── Sidebar ──────────────────────────────────────── -->
  <aside class="b-sidebar">
    <a class="b-sidebar-logo" href="/">
      <img src="/assets/logo_2.svg" alt="CampusConnect">
      <span class="b-logo-name">CampusConnect</span>
    </a>

    <div class="b-sidebar-section">Navigate</div>
    <nav class="b-sidebar-nav">
      <a class="b-nav-item active" href="/pages/browse.html">
        <span class="b-nav-icon"><svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/></svg></span>
        Browse
      </a>
      <a class="b-nav-item" href="/pages/dashboard.html">
        <span class="b-nav-icon"><svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path d="M3 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h6a1 1 0 110 2H4a1 1 0 01-1-1z"/></svg></span>
        Dashboard
      </a>
      <a class="b-nav-item" href="/pages/inbox.html">
        <span class="b-nav-icon"><svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/><path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/></svg></span>
        Inbox
      </a>
      <a class="b-nav-item" href="/pages/leaderboard.html">
        <span class="b-nav-icon"><svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg></span>
        Leaderboard
      </a>
      <div class="b-sidebar-divider"></div>
      <a class="b-nav-item" href="/pages/listing-form.html">
        <span class="b-nav-icon"><svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/></svg></span>
        List a service
      </a>
    </nav>

    <div class="b-sidebar-footer" id="sidebarFooter" style="display:none">
      <div id="sidebarAvatarWrap"></div>
      <div class="b-sf-info">
        <div class="b-sf-name" id="sidebarName"></div>
        <div class="b-sf-sub" id="sidebarRank"></div>
      </div>
    </div>
  </aside>

  <!-- ── Main ──────────────────────────────────────── -->
  <main class="b-main">
    <!-- Header -->
    <div class="b-main-header">
      <div class="b-header-left">
        <div class="b-eyebrow">Marketplace</div>
        <h1>Browse services</h1>
      </div>
      <a class="b-btn b-btn-primary" href="/pages/listing-form.html">
        <svg viewBox="0 0 20 20" fill="currentColor" width="14" height="14"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/></svg>
        List a service
      </a>
    </div>

    <!-- Scrollable content -->
    <div class="b-scroll">

      <!-- Filter card -->
      <div class="b-filter-card">
        <div class="b-filter-row">
          <div class="b-filter-search">
            <span class="b-filter-search-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </span>
            <input type="text" id="searchInput" placeholder="Search services, skills, sellers...">
          </div>
          <select id="sortSelect" class="b-filter-sort">
            <option value="created_at">Latest</option>
            <option value="price_asc">Price: Low to High</option>
            <option value="price_desc">Price: High to Low</option>
            <option value="rating">Top rated</option>
          </select>
        </div>
        <div class="b-cat-pills" id="categoryPills">
          <button class="b-cat-pill active" data-cat="">All categories</button>
        </div>
      </div>

      <!-- Results bar -->
      <div class="b-results-bar">
        <span class="b-results-count" id="resultsCount">&nbsp;</span>
      </div>

      <!-- Grid -->
      <div id="listingsGrid">
        <div class="loading-wrap"><div class="spinner"></div></div>
      </div>

    </div>
  </main>
</div>

<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/config.js"></script>
<script>window.sbClient = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON);</script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/common.js"></script>
<script src="/js/browse.js"></script>
<script>
  // Populate sidebar footer if logged in
  document.addEventListener('DOMContentLoaded', async () => {
    try {
      if (!window.Auth?.isLoggedIn?.()) return;
      const user = await window.Auth.getProfile();
      if (!user) return;
      const footer = document.getElementById('sidebarFooter');
      const avatarEl = document.getElementById('sidebarAvatarWrap');
      const nameEl   = document.getElementById('sidebarName');
      const rankEl   = document.getElementById('sidebarRank');
      if (footer && avatarEl && nameEl) {
        avatarEl.innerHTML = window.avatarHtml ? window.avatarHtml(user, 'sm') : '';
        nameEl.textContent = user.name || 'User';
        if (rankEl) rankEl.textContent = user.rank || '';
        footer.style.display = 'flex';
      }
    } catch(_) {}
  });
</script>
</body>
</html>
