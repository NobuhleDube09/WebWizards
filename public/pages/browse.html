<!doctype html>
<html lang="en">
<head>
  <script>(function(){if(localStorage.getItem("cc_theme")==="dark")document.documentElement.setAttribute("data-theme","dark");}());</script>
  <link rel="stylesheet" href="/css/dark.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/assets/campus_logo.svg" type="image/svg+xml">
  <title>Browse Services &mdash; CampusConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
     *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #121826;
      color: #ffffff;
      overflow-x: hidden;
    }

    /* Animated Background */
    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: -1;
    }

    .bg-animation div {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      animation: float 25s infinite ease-in-out;
    }

    .bg-animation div:nth-child(1) { 
      top: 10%; left: -5%; width: 500px; height: 500px; animation-delay: 0s; 
      background: radial-gradient(circle, rgba(249,115,22,0.12), transparent);
    }
    .bg-animation div:nth-child(2) { 
      bottom: 10%; right: -5%; width: 600px; height: 600px; animation-delay: -8s; 
      background: radial-gradient(circle, rgba(236,72,153,0.08), transparent);
    }
    .bg-animation div:nth-child(3) { 
      top: 40%; right: 20%; width: 350px; height: 350px; animation-delay: -15s; 
      background: radial-gradient(circle, rgba(6,182,212,0.08), transparent);
    }
    .bg-animation div:nth-child(4) { 
      bottom: 30%; left: 15%; width: 450px; height: 450px; animation-delay: -22s; 
      background: radial-gradient(circle, rgba(168,85,247,0.06), transparent);
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(40px, -40px) scale(1.05); }
      66% { transform: translate(-30px, 30px) scale(0.95); }
    }

    /* Shell Layout */
    .b-shell {
      display: flex;
      height: 100vh;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    /* Sidebar */
    .b-sidebar {
      width: 280px;
      flex-shrink: 0;
      background: rgba(18, 24, 38, 0.95);
      backdrop-filter: blur(20px);
      border-right: 1px solid rgba(249,115,22,0.2);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .b-sidebar-logo {
      padding: 24px 100px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      text-decoration: none;
    }

    .b-sidebar-logo i {
      font-size: 28px;
      color: #f97316;
    }

    .b-logo-name {
      font-weight: 800;
      font-size: 1.1rem;
      background: linear-gradient(135deg, #f97316, #f43f5e, #06b6d4);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .b-sidebar-section {
      padding: 20px 20px 8px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
    }

    .b-sidebar-nav {
      flex: 1;
      overflow-y: auto;
      padding: 4px 12px 12px;
    }

    .b-nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 0.875rem;
      font-weight: 500;
      color: #cbd5e1;
      text-decoration: none;
      transition: all 0.2s;
      margin-bottom: 4px;
    }

    .b-nav-item:hover {
      background: rgba(255,255,255,0.05);
      color: white;
    }

    .b-nav-item.active {
      background: linear-gradient(135deg, rgba(249,115,22,0.15), rgba(236,72,153,0.08));
      color: #f97316;
      border-left: 2px solid #f97316;
    }

    .b-nav-icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .b-sidebar-divider {
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin: 12px;
    }

    .b-sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    /* Main Area */
    .b-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .b-main-header {
      padding: 20px 28px 16px;
      background: rgba(18, 24, 38, 0.8);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(249,115,22,0.2);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .b-header-left .b-eyebrow {
      font-size: 0.7rem;
      font-weight: 700;
      color: #f97316;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }

    .b-header-left h1 {
      font-size: 1.6rem;
      font-weight: 800;
      background: linear-gradient(135deg, #ffffff, #cbd5e1);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .b-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px 32px;
    }

    /* Buttons */
    .b-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 12px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      border: none;
    }

    .b-btn-primary {
      background: linear-gradient(135deg, #f97316, #f43f5e);
      color: white;
    }

    .b-btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(249,115,22,0.3);
    }

    /* Filter Card */
    .b-filter-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(249,115,22,0.15);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 24px;
    }

    .b-filter-row {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .b-filter-search {
      flex: 1;
      position: relative;
      min-width: 200px;
    }

    .b-filter-search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #64748b;
    }

    .b-filter-search input {
      width: 100%;
      padding: 12px 16px 12px 42px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      font-size: 0.875rem;
      color: white;
      font-family: inherit;
      outline: none;
    }

    .b-filter-search input:focus {
      border-color: #f97316;
    }

    .b-filter-search input::placeholder {
      color: #64748b;
    }

    .b-filter-sort {
      padding: 12px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      font-size: 0.875rem;
      color: white;
      font-family: inherit;
      cursor: pointer;
      outline: none;
      min-width: 160px;
    }

    .b-filter-sort option {
      background: #1e293b;
    }

    /* Category Pills */
    .b-cat-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .b-cat-pill {
      padding: 8px 18px;
      border-radius: 30px;
      font-size: 0.8rem;
      font-weight: 600;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #cbd5e1;
      cursor: pointer;
      transition: all 0.2s;
    }

    .b-cat-pill:hover {
      background: rgba(249,115,22,0.15);
      border-color: #f97316;
    }

    .b-cat-pill.active {
      background: linear-gradient(135deg, #f97316, #f43f5e);
      color: white;
      border-color: transparent;
    }

    /* Results Bar */
    .b-results-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .b-results-count {
      font-size: 0.85rem;
      color: #94a3b8;
    }

    .b-results-count strong {
      color: #f97316;
    }

    /* Listings Grid */
    #listingsGrid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    /* Listing Card */
    .listing-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(249,115,22,0.15);
      border-radius: 20px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s;
    }

    .listing-card:hover {
      transform: translateY(-4px);
      border-color: #f97316;
      box-shadow: 0 12px 30px rgba(0,0,0,0.3);
    }

    .listing-img-wrap {
      position: relative;
      height: 180px;
      background: linear-gradient(135deg, rgba(249,115,22,0.1), rgba(236,72,153,0.05));
      overflow: hidden;
    }

    .listing-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s;
    }

    .listing-card:hover .listing-img {
      transform: scale(1.05);
    }

    .listing-img-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      color: #f97316;
    }

    .listing-body {
      padding: 16px;
    }

    .listing-title {
      font-weight: 700;
      font-size: 1rem;
      color: white;
      margin-bottom: 6px;
    }

    .listing-desc {
      color: #94a3b8;
      font-size: 0.8rem;
      line-height: 1.5;
      margin-bottom: 12px;
    }

    .listing-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid rgba(255,255,255,0.08);
      padding-top: 12px;
      margin-top: 8px;
    }

    .listing-seller {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #94a3b8;
      font-size: 0.75rem;
    }

    .listing-price {
      font-weight: 800;
      font-size: 1rem;
      color: #f97316;
    }

    /* Empty State */
    .b-empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      border: 1px solid rgba(249,115,22,0.15);
    }

    .b-empty i {
      font-size: 48px;
      color: #f97316;
      margin-bottom: 16px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.05);
    }

    ::-webkit-scrollbar-thumb {
      background: #f97316;
      border-radius: 10px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .b-sidebar {
        position: fixed;
        left: -280px;
        transition: left 0.3s;
        z-index: 100;
      }
      
      .b-scroll {
        padding: 16px;
      }
      
      #listingsGrid {
        grid-template-columns: 1fr;
      }
      
      .b-filter-row {
        flex-direction: column;
      }
      
      .b-filter-sort {
        width: 100%;
      }
    }
  </style>
</head>
<body>
<div class="b-shell">

  <!-- ── Sidebar ──────────────────────────────────────── -->
  <aside class="b-sidebar">
    <a class="b-sidebar-logo" href="/">
      <img src="../assets/logo_2.svg" alt="CampusConnect">
      <span class="b-logo-name">CampusConnect</span>
    </a>

    <div class="b-sidebar-section">Navigate</div>
    <nav class="b-sidebar-nav">
      <a class="b-nav-item active" href="/pages/browse.html">
        <span class="b-nav-icon"><svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/></svg></span>
        Browse
      </a>
      <a class="b-nav-item" href="/pages/dashboard.html">
        <span class="b-nav-icon"><svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path d="M3 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h6a1 1 0 110 2H4a1 1 0 01-1-1z"/></svg></span>
        Dashboard
      </a>
      <a class="b-nav-item" href="/pages/inbox.html">
        <span class="b-nav-icon"><svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/><path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/></svg></span>
        Inbox
      </a>
      <a class="b-nav-item" href="/pages/leaderboard.html">
        <span class="b-nav-icon"><svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg></span>
        Leaderboard
      </a>
      <div class="b-sidebar-divider"></div>
      <a class="b-nav-item" href="/pages/listing-form.html">
        <span class="b-nav-icon"><svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/></svg></span>
        List a service
      </a>
    </nav>

    <div class="b-sidebar-footer" id="sidebarFooter" style="display:none">
      <div id="sidebarAvatarWrap"></div>
      <div class="b-sf-info">
        <div class="b-sf-name" id="sidebarName"></div>
        <div class="b-sf-sub" id="sidebarRank"></div>
      </div>
    </div>
  </aside>

  <!-- ── Main ──────────────────────────────────────── -->
  <main class="b-main">
    <!-- Header -->
    <div class="b-main-header">
      <div class="b-header-left">
        <div class="b-eyebrow">Marketplace</div>
        <h1>Browse services</h1>
      </div>
      <a class="b-btn b-btn-primary" href="/pages/listing-form.html">
        <svg viewBox="0 0 20 20" fill="currentColor" width="14" height="14"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/></svg>
        List a service
      </a>
    </div>

    <!-- Scrollable content -->
    <div class="b-scroll">

      <!-- Filter card -->
      <div class="b-filter-card">
        <div class="b-filter-row">
          <div class="b-filter-search">
            <span class="b-filter-search-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </span>
            <input type="text" id="searchInput" placeholder="Search services, skills, sellers...">
          </div>
          <select id="sortSelect" class="b-filter-sort">
            <option value="created_at">Latest</option>
            <option value="price_asc">Price: Low to High</option>
            <option value="price_desc">Price: High to Low</option>
            <option value="rating">Top rated</option>
          </select>
        </div>
        <div class="b-cat-pills" id="categoryPills">
          <button class="b-cat-pill active" data-cat="">All categories</button>
        </div>
      </div>

      <!-- Results bar -->
      <div class="b-results-bar">
        <span class="b-results-count" id="resultsCount">&nbsp;</span>
      </div>

      <!-- Grid -->
      <div id="listingsGrid">
        <div class="loading-wrap"><div class="spinner"></div></div>
      </div>

    </div>
  </main>
</div>

<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/config.js"></script>
<script>window.sbClient = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON);</script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/common.js"></script>
<script src="/js/browse.js"></script>
<script>
  // Populate sidebar footer if logged in
  document.addEventListener('DOMContentLoaded', async () => {
    try {
      if (!window.Auth?.isLoggedIn?.()) return;
      const user = await window.Auth.getProfile();
      if (!user) return;
      const footer = document.getElementById('sidebarFooter');
      const avatarEl = document.getElementById('sidebarAvatarWrap');
      const nameEl   = document.getElementById('sidebarName');
      const rankEl   = document.getElementById('sidebarRank');
      if (footer && avatarEl && nameEl) {
        avatarEl.innerHTML = window.avatarHtml ? window.avatarHtml(user, 'sm') : '';
        nameEl.textContent = user.name || 'User';
        if (rankEl) rankEl.textContent = user.rank || '';
        footer.style.display = 'flex';
      }
    } catch(_) {}
  });
</script>
</body>
</html>
